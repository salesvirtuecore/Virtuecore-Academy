/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let U=null,P={},AC=null,AM=null,AL=null,AQ=null,EXP={},QS={qi:0,ans:[],sel:null,sub:false};

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
const allL=c=>c.modules.flatMap(m=>m.lessons);
const cPct=c=>{const ls=allL(c);return ls.length?Math.round(ls.filter(l=>P[l.id]).length/ls.length*100):0};
const cDone=c=>allL(c).every(l=>P[l.id])&&c.modules.every(m=>!m.quiz||P[m.quiz.id]?.passed);
const mDone=m=>m.lessons.every(l=>P[l.id])&&(!m.quiz||P[m.quiz.id]?.passed);
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const set=h=>document.getElementById("app-body").innerHTML=h;
const saveP=()=>{try{localStorage.setItem("vc_p_"+U.email,JSON.stringify(P))}catch(e){}};

function toast(msg,col){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.borderColor=col||"var(--green)";t.style.color=col||"var(--green)";
  t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2600);
}

async function sendToZapier(data){
  if(!ZAPIER_WEBHOOK)return;
  try{await fetch(ZAPIER_WEBHOOK,{method:"POST",mode:"no-cors",body:JSON.stringify({timestamp:new Date().toLocaleString("en-GB"),name:U.name,email:U.email,course:data.course,quiz:data.quiz,score:data.score+"%",status:data.passed?"PASSED":"FAILED",correct:data.correct+"/"+data.total})})}catch(e){}
}

/* ═══════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════ */
function doLogin(){
  const n=document.getElementById("inp-name").value.trim();
  const e=document.getElementById("inp-email").value.trim().toLowerCase();
  const c=document.getElementById("inp-code").value.trim();
  const err=document.getElementById("login-err");
  if(!n||!e||!c){err.style.display="block";err.textContent="Please fill in all fields.";return}
  if(!/\S+@\S+\.\S+/.test(e)){err.style.display="block";err.textContent="Please enter a valid email.";return}
  const isAdmin=e===ADMIN_EMAIL&&c===ADMIN_CODE;
  const isVA=c===VA_CODE;
  if(!isAdmin&&!isVA){err.style.display="block";err.textContent="Incorrect access code. Contact VirtueCore management.";return}
  U={name:n,email:e,isAdmin};
  try{
    const raw=localStorage.getItem("vc_p_"+e);P=raw?JSON.parse(raw):{};
    const us=JSON.parse(localStorage.getItem("vc_users")||"[]");
    const idx=us.findIndex(u=>u.email===e);
    if(idx>=0)us[idx].name=n;else us.push({name:n,email:e,joined:new Date().toLocaleDateString("en-GB")});
    localStorage.setItem("vc_users",JSON.stringify(us));
  }catch(ex){P={}}
  document.getElementById("nav-uname").textContent=n;
  if(isAdmin)document.getElementById("tab-admin").classList.remove("hide");
  document.getElementById("pg-login").style.display="none";
  document.getElementById("pg-app").style.display="block";
  renderDashboard();
}

["inp-name","inp-email","inp-code"].forEach(id=>document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()}));

function doLogout(){
  U=null;P={};
  document.getElementById("pg-app").style.display="none";
  document.getElementById("pg-login").style.display="flex";
  ["inp-name","inp-email","inp-code"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("login-err").style.display="none";
  document.getElementById("tab-admin").classList.add("hide");
}

function goHome(){switchTab("courses")}

function switchTab(t){
  document.querySelectorAll(".nav-tab").forEach(b=>b.classList.remove("on"));
  document.getElementById("tab-"+t).classList.add("on");
  t==="courses"?renderDashboard():renderAdmin();
}

/* ═══════════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════════ */
function renderDashboard(){
  const total=COURSES.flatMap(c=>allL(c)).length;
  const done=COURSES.flatMap(c=>allL(c)).filter(l=>P[l.id]).length;
  const dc=COURSES.filter(c=>cDone(c)).length;
  const pq=Object.values(P).filter(v=>v?.passed).length;
  const pct=total?Math.round(done/total*100):0;
  let h=`<div class="pg-title">Welcome back, ${esc(U.name.split(" ")[0])} 👋</div>
  <div class="pg-sub">Continue your training or start a new course below.</div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-lbl">Overall Progress</div><div class="stat-val">${pct}%</div><div class="stat-sub">${done} of ${total} lessons done</div></div>
    <div class="stat-card"><div class="stat-lbl">Courses Completed</div><div class="stat-val">${dc}</div><div class="stat-sub">of ${COURSES.length} total</div></div>
    <div class="stat-card"><div class="stat-lbl">Quizzes Passed</div><div class="stat-val">${pq}</div><div class="stat-sub">assessments passed</div></div>
  </div><div class="course-grid">`;
  COURSES.forEach(c=>{
    const p=cPct(c),d=cDone(c);
    h+=`<div class="c-card" onclick="openCourse('${c.id}')">
      ${d?'<div class="done-badge">✓ Complete</div>':""}
      <div class="c-icon" style="background:${c.color}22">${c.icon}</div>
      <div class="c-tag" style="background:${c.tagBg};color:${c.tagCol}">${c.tag}</div>
      <div class="c-title">${esc(c.title)}</div>
      <div class="c-desc">${esc(c.desc)}</div>
      <div class="c-meta"><span>${c.modules.length} modules · ${allL(c).length} lessons</span><span style="color:${p>0?"var(--gold)":"var(--muted)"};font-weight:700">${p}%</span></div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${p}%;background:${d?"var(--green)":"var(--gold)"}"></div></div>
    </div>`;
  });
  set(h+"</div>");
}

/* ═══════════════════════════════════════════════════════
   COURSE
═══════════════════════════════════════════════════════ */
function openCourse(id){AC=COURSES.find(c=>c.id===id);EXP={};AC.modules.forEach(m=>EXP[m.id]=true);renderCourse();}

function renderCourse(){
  const c=AC,p=cPct(c);
  let h=`<button class="back-btn" onclick="renderDashboard()">← Back to courses</button>
  <div class="hero"><div class="hero-icon" style="background:${c.color}22">${c.icon}</div>
  <div style="flex:1"><div class="c-tag" style="background:${c.tagBg};color:${c.tagCol}">${c.tag}</div>
  <div class="hero-title">${esc(c.title)}</div><div class="hero-desc">${esc(c.desc)}</div>
  <div class="hero-stats">
    <div class="h-stat"><strong>${c.modules.length}</strong>Modules</div>
    <div class="h-stat"><strong>${allL(c).length}</strong>Lessons</div>
    <div class="h-stat"><strong style="color:var(--gold)">${p}%</strong>Done</div>
  </div></div></div><div class="mod-list">`;
  c.modules.forEach((m,i)=>{
    const open=EXP[m.id],done=mDone(m);
    h+=`<div class="mod-box"><div class="mod-head" onclick="toggleMod('${m.id}')">
      <div class="mod-num ${done?"ok":""}">${done?"✓":i+1}</div>
      <div style="flex:1"><div class="mod-info-title">${esc(m.title)}</div><div class="mod-info-sub">${m.lessons.length} lesson${m.lessons.length>1?"s":""}</div></div>
      <div class="chev ${open?"open":""}">▾</div></div>
    <div class="mod-body ${open?"open":""}">`;
    m.lessons.forEach(l=>{
      const ld=P[l.id];
      h+=`<div class="l-row" onclick="openLesson('${l.id}','${m.id}')">
        <div class="l-dot ${ld?"ok":""}"></div><span class="l-name ${ld?"ok":""}">${esc(l.title)}</span>
        <span class="l-dur">📖 ${l.mins} min</span></div>`;
    });
    if(m.quiz){
      const qd=P[m.quiz.id];
      h+=`<div class="quiz-row" onclick="openQuiz('${m.quiz.id}','${m.id}')">
        <div class="q-ico">📝</div><div style="flex:1">
          <div class="q-row-title">${esc(m.quiz.title)}</div><div class="q-row-sub">${m.quiz.qs.length} questions</div></div>
        ${qd?`<span style="font-size:12px;color:var(--green);font-weight:800">✓ ${qd.score}%</span>`:'<span style="font-size:11px;color:var(--muted)">Not taken</span>'}
      </div>`;
    }
    h+="</div></div>";
  });
  set(h+"</div>");
}

function toggleMod(id){EXP[id]=!EXP[id];renderCourse();}

/* ═══════════════════════════════════════════════════════
   LESSON
═══════════════════════════════════════════════════════ */
function openLesson(lid,mid){
  AM=AC.modules.find(m=>m.id===mid);AL=AM.lessons.find(l=>l.id===lid);renderLesson();
}

function renderLesson(){
  const ls=allL(AC),idx=ls.findIndex(l=>l.id===AL.id),ld=P[AL.id];
  const hasPrev=idx>0,hasNext=idx<ls.length-1,isLast=!hasNext;
  const hasQuiz=isLast&&AM?.quiz&&!P[AM.quiz.id];
  let sb="";
  ls.forEach(l=>{
    const d=P[l.id],on=l.id===AL.id;
    const mod=AC.modules.find(m=>m.lessons.find(ll=>ll.id===l.id));
    sb+=`<div class="sb-item ${on?"on":""} ${d?"done":""}" onclick="openLesson('${l.id}','${mod.id}')">
      <div class="sb-dot ${on?"on":d?"ok":""}"></div>${esc(l.title)}</div>`;
  });
  let rb="";
  if(ld)rb+='<span class="done-text">✓ Complete</span>';
  else rb+=`<button class="btn-green" onclick="markDone()">Mark complete ✓</button>`;
  if(hasNext)rb+=`<button class="btn-gold-sm" onclick="goNext()">Next →</button>`;
  else if(hasQuiz)rb+=`<button class="btn-gold-sm" onclick="openQuiz('${AM.quiz.id}','${AM.id}')">Take quiz →</button>`;
  set(`<button class="back-btn" onclick="renderCourse()">← ${esc(AC.title)}</button>
  <div class="lesson-layout">
    <div class="l-sidebar"><div class="sb-ttl">Course contents</div>${sb}</div>
    <div class="lesson-card">
      <div class="l-meta">${esc(AM?.title||"")}</div>
      <div class="l-title">${esc(AL.title)}</div>
      <div class="l-body">${esc(AL.body)}</div>
      <div class="l-actions">
        ${hasPrev?'<button class="btn-sec" onclick="goPrev()">← Previous</button>':"<div></div>"}
        <div class="l-ar">${rb}</div>
      </div>
    </div>
  </div>`);
}

function markDone(){P[AL.id]=true;saveP();toast("✓ Lesson complete!");renderLesson();}

function goNext(){
  const ls=allL(AC),idx=ls.findIndex(l=>l.id===AL.id);
  if(!P[AL.id]){P[AL.id]=true;saveP();}
  if(idx<ls.length-1){const n=ls[idx+1];AM=AC.modules.find(m=>m.lessons.find(l=>l.id===n.id));AL=n;renderLesson();window.scrollTo(0,0);}
}

function goPrev(){
  const ls=allL(AC),idx=ls.findIndex(l=>l.id===AL.id);
  if(idx>0){const p=ls[idx-1];AM=AC.modules.find(m=>m.lessons.find(l=>l.id===p.id));AL=p;renderLesson();window.scrollTo(0,0);}
}

/* ═══════════════════════════════════════════════════════
   QUIZ
═══════════════════════════════════════════════════════ */
function openQuiz(qid,mid){AM=AC.modules.find(m=>m.id===mid);AQ=AM.quiz;QS={qi:0,ans:[],sel:null,sub:false};renderQuiz();window.scrollTo(0,0);}

function renderQuiz(){
  const q=AQ.qs[QS.qi];
  let opts="";
  q.opts.forEach((o,i)=>{
    const correct=QS.sub&&i===q.ans,wrong=QS.sub&&i===QS.sel&&i!==q.ans,sel=!QS.sub&&i===QS.sel;
    opts+=`<button class="opt ${correct?"correct":wrong?"wrong":sel?"sel":""}" onclick="selOpt(${i})" ${QS.sub?"disabled":""}>${esc(o)}</button>`;
  });
  let acts="";
  if(!QS.sub&&QS.sel!==null)acts='<button class="btn-gold-sm" onclick="subAns()">Submit answer</button>';
  else if(QS.sub&&QS.qi<AQ.qs.length-1)acts='<button class="btn-gold-sm" onclick="nextQ()">Next →</button>';
  else if(QS.sub&&QS.qi===AQ.qs.length-1)acts='<button class="btn-gold-sm" onclick="finishQ()">See results →</button>';
  const pct=Math.round(QS.qi/AQ.qs.length*100);
  set(`<button class="back-btn" onclick="renderCourse()">← Back to course</button>
  <div class="quiz-wrap">
    <div class="q-header"><span class="q-header-title">📝 ${esc(AQ.title)}</span><span class="q-header-sub">Question ${QS.qi+1} of ${AQ.qs.length}</span></div>
    <div style="margin-bottom:14px"><div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:var(--blue)"></div></div></div>
    <div class="q-card">
      <div class="q-num">Question ${QS.qi+1}</div>
      <div class="q-text">${esc(q.q)}</div>
      <div class="opts">${opts}</div>
      <div class="q-actions">${acts}</div>
    </div>
  </div>`);
}

function selOpt(i){if(!QS.sub){QS.sel=i;renderQuiz();}}
function subAns(){QS.sub=true;QS.ans.push(QS.sel);renderQuiz();}
function nextQ(){QS.qi++;QS.sel=null;QS.sub=false;renderQuiz();window.scrollTo(0,0);}

function finishQ(){
  const correct=QS.ans.filter((a,i)=>a===AQ.qs[i].ans).length;
  const score=Math.round(correct/AQ.qs.length*100),passed=score>=70;
  P[AQ.id]={score,passed};saveP();
  sendToZapier({course:AC.title,quiz:AQ.title,score,passed,correct,total:AQ.qs.length});
  set(`<div class="result-wrap"><div class="result-card">
    <div class="res-emo">${passed?"🏆":"📚"}</div>
    <div class="res-title">${passed?"Quiz Passed!":"Keep Studying"}</div>
    <div class="res-score ${passed?"pass":"fail"}">${score}%</div>
    <div class="res-sub">${passed?`You got ${correct} of ${AQ.qs.length} correct. Module complete.`:`You got ${correct} of ${AQ.qs.length} correct. You need 70% to pass. Review the lessons and try again.`}</div>
    <div class="res-btns">
      ${!passed?'<button class="btn-sec" onclick="retryQ()">Retry quiz</button>':""}
      <button class="btn-gold-sm" onclick="renderCourse()">Back to course →</button>
    </div>
  </div></div>`);
  window.scrollTo(0,0);
}

function retryQ(){QS={qi:0,ans:[],sel:null,sub:false};renderQuiz();window.scrollTo(0,0);}

/* ═══════════════════════════════════════════════════════
   ADMIN
═══════════════════════════════════════════════════════ */
function renderAdmin(){
  let users=[];try{users=JSON.parse(localStorage.getItem("vc_users")||"[]")}catch(e){}
  const total=COURSES.flatMap(c=>allL(c)).length;
  const avg=users.length?Math.round(users.reduce((a,u)=>{let p={};try{p=JSON.parse(localStorage.getItem("vc_p_"+u.email)||"{}")}catch(e){}return a+Object.keys(p).filter(k=>p[k]===true).length/total*100},0)/users.length):0;
  const thS="padding:11px 17px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--s2)";
  const rows=users.length?users.map(u=>{
    let p={};try{p=JSON.parse(localStorage.getItem("vc_p_"+u.email)||"{}")}catch(e){}
    const done=Object.keys(p).filter(k=>p[k]===true).length;
    const pct=Math.round(done/total*100);
    const dc=COURSES.filter(c=>allL(c).every(l=>p[l.id])&&c.modules.every(m=>!m.quiz||p[m.quiz.id]?.passed)).length;
    const passed=Object.values(p).filter(v=>v?.passed).length;
    const failed=Object.values(p).filter(v=>v&&v.passed===false).length;
    return `<tr>
      <td><strong style="color:var(--text)">${esc(u.name)}</strong></td>
      <td>${esc(u.email)}</td><td>${u.joined||"—"}</td>
      <td><div style="display:flex;align-items:center;gap:8px"><div class="prog-wrap" style="width:70px"><div class="prog-fill" style="width:${pct}%;background:${pct===100?"var(--green)":"var(--gold)"}"></div></div><span style="font-weight:800;color:var(--gold)">${pct}%</span></div></td>
      <td>${dc}/${COURSES.length}</td>
      <td>${passed?`<span class="badge-pass">✓ ${passed} passed</span>`:""}${failed?`<span style="background:rgba(239,68,68,.12);color:#FCA5A5;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:4px">✗ ${failed} failed</span>`:""}${!passed&&!failed?'<span class="badge-none">none yet</span>':""}</td>
    </tr>`;
  }).join(""):`<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--muted)">No VAs enrolled yet.</td></tr>`;
  set(`<div class="pg-title">Admin Dashboard</div>
  <div class="pg-sub">Track VA training progress. Only visible to sales@virtuecore.co.uk.</div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-lbl">Total VAs</div><div class="stat-val">${users.length}</div><div class="stat-sub">enrolled</div></div>
    <div class="stat-card"><div class="stat-lbl">Avg Completion</div><div class="stat-val">${avg}%</div><div class="stat-sub">across all VAs</div></div>
    <div class="stat-card"><div class="stat-lbl">Courses</div><div class="stat-val">${COURSES.length}</div><div class="stat-sub">available</div></div>
  </div>
  <div class="tbl-wrap"><table class="adm-table">
    <thead><tr><th style="${thS}">Name</th><th style="${thS}">Email</th><th style="${thS}">Joined</th><th style="${thS}">Progress</th><th style="${thS}">Courses</th><th style="${thS}">Quizzes</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  <div class="adm-actions">💡 <strong style="color:var(--text)">Live tracking:</strong> Add your Zapier webhook URL in the code to push every quiz result to Google Sheets in real time. VA access code: <strong style="color:var(--gold)">VCTEAM2024</strong> · Admin code: <strong style="color:var(--gold)">VCAdmin2024!</strong></div>`);
}
</script>
</body>
</html>
