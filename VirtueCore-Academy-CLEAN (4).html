{id:"em-m2l1",title:"Creating Email Designs in MailChimp",mins:17,video:"8533b2eb79b142319aadf1c012202621",body:`CREATING EMAIL DESIGNS IN MAILCHIMP — SOP

PURPOSE
This SOP covers how to build professional, on-brand email campaigns inside MailChimp's email designer. Every email you create must look polished, load correctly on mobile, and represent the client's brand accurately.

BEFORE YOU START
• Have the client's brand kit ready: logo file, hex colour codes, font preferences
• Know the goal of the email: promotional, informational, automated trigger
• Have the copy (subject line + body text) drafted and approved before designing

STEP 1 — CREATE A NEW CAMPAIGN
1. In MailChimp, go to Campaigns → Create Campaign
2. Select "Email"
3. Choose campaign type: Regular, Automated, or A/B Test
4. Name the campaign clearly (use format: ClientName_CampaignType_Date)

STEP 2 — SET UP CAMPAIGN DETAILS
• To: Select the correct audience or segment
• From: Use the client's branded from name and email address (not a generic one)
• Subject line: Keep to 40–60 characters. Avoid spam trigger words (FREE, URGENT, !!!)
• Preview text: Write 60–90 characters that complement the subject line

STEP 3 — CHOOSE A TEMPLATE
Options:
• Basic layouts — clean, minimal, good for most campaigns
• Themed templates — pre-styled, faster but less on-brand
• Code your own — maximum control, use only if you have HTML email experience
• Saved templates — reuse a template you've already built for this client

Recommended: Start with a Basic layout and customise to match brand.

STEP 4 — BUILD THE EMAIL IN THE DRAG-AND-DROP EDITOR
Structure every marketing email with:
1. Header — logo, navigation links (optional)
2. Hero section — strong headline + image or colour block
3. Body — main message, 2–4 short paragraphs max
4. CTA button — one clear, bold call to action
5. Footer — unsubscribe link, physical address, social icons

DESIGN PRINCIPLES
• Single-column layout for mobile compatibility
• Font size minimum 14px for body, 22px+ for headings
• CTA button: high-contrast colour, minimum 44px tall, short action text ("Shop Now", "Book a Call", "Claim Offer")
• Max email width: 600px
• Total images: use sparingly. Many email clients block images by default — your email must make sense as text alone.

STEP 5 — PREVIEW AND TEST
• Use Preview Mode to check desktop and mobile rendering
• Send a test email to yourself and to a Gmail/Outlook address
• Check that all links work
• Check that images load`},

{id:"em-m2l2",title:"Creating an Email Template with Images & Text",mins:19,video:"6913bbf000c94d5d80a275599c5b0166",body:`CREATING AN EMAIL TEMPLATE WITH IMAGES & TEXT — SOP

PURPOSE
Building a reusable email template with the client's branding saves time on every future campaign and ensures visual consistency. This SOP walks through creating a fully branded template inside MailChimp that includes both image blocks and formatted text sections.

WHEN TO USE THIS
• When onboarding a new client who has no existing MailChimp template
• When the client has rebranded and templates need updating
• When building a new type of email (e.g. promotional vs. transactional) that needs its own template

STEP 1 — GATHER BRAND ASSETS
Before opening MailChimp, collect:
• Client logo (PNG with transparent background, minimum 300px wide)
• Brand primary and secondary colour hex codes
• Brand fonts (or closest Google/web-safe equivalent)
• Any product or lifestyle imagery the client uses regularly
• Client's physical address (required in email footer by law)

STEP 2 — OPEN TEMPLATE BUILDER
1. In MailChimp, go to Content → Email Templates
2. Click Create Template
3. Choose "Layouts" → Select a basic single-column or two-column structure
4. Name the template: ClientName_TemplateName

STEP 3 — SET GLOBAL STYLES
Click on the "Design" tab (not a content block — the global design panel):
• Background colour: white (#FFFFFF) or client's chosen background
• Body font: select brand font or fallback (Arial, Georgia, Helvetica)
• Link colour: brand primary colour
• Heading colour: brand heading colour

STEP 4 — BUILD THE HEADER BLOCK
1. Drag an Image block to the top of the template
2. Upload the client's logo
3. Set width to 150–200px, centre-aligned
4. Add a thin brand-colour divider line below the logo

STEP 5 — BUILD THE HERO BLOCK
Options:
A) Full-width image — drag an Image block, upload a banner image (1200 x 400px recommended)
B) Colour block with text — drag a Text block, set background to brand primary colour, headline in white

STEP 6 — BUILD THE BODY SECTION
• Drag Text blocks for main copy areas
• Set font size to 15–16px, line height 1.6
• Keep paragraphs to 3–4 lines maximum
• Use bullet points for lists rather than long run-on sentences

STEP 7 — ADD IMAGES WITHIN THE BODY
For product or lifestyle images:
1. Drag an Image block to the desired position
2. Upload image (max 1MB for email — compress before uploading)
3. Add alt text describing the image
4. Optionally link the image to a product page or landing page

STEP 8 — ADD CTA BUTTON
1. Drag a Button block into position
2. Button text: short action phrase (max 4 words)
3. Button colour: brand primary or a high-contrast accent
4. Add the destination URL
5. Centre the button

STEP 9 — BUILD THE FOOTER
Must include:
• Unsubscribe link (MailChimp adds this automatically but verify it's visible)
• Client business name and physical address
• Social media icons linking to client profiles
• Optional: "Why am I receiving this?" copy

STEP 10 — SAVE THE TEMPLATE
Click Save and Exit. The template will appear in Content → Email Templates for reuse on all future campaigns.`},

{id:"em-m2l3",title:"Email Formatting & Optimisation",mins:7,video:"0858a564307e4e00839fe6457b51d9cb",body:`EMAIL FORMATTING & OPTIMISATION — SOP

PURPOSE
A well-formatted email is one that delivers its message clearly, renders correctly across all email clients, avoids spam filters, and drives the reader to take action. This SOP covers the essential formatting rules every team member must follow on all client emails.

SUBJECT LINE RULES
• Length: 40–60 characters (some sources say up to 70 — keep it concise)
• No ALL CAPS
• Avoid spam trigger words: FREE, URGENT, ACT NOW, CONGRATULATIONS, WINNER, $$
• Personalisation increases open rates — use merge tags where appropriate: "Hi *|FNAME|*"
• Test subject lines using an A/B send when possible
• Emojis: use sparingly and only if on-brand

PREVIEW TEXT
• 85–100 characters
• Should complement the subject line, not repeat it
• This is your "second subject line" — make it count

COPY FORMATTING
• Short paragraphs — 2–4 lines maximum
• Use headers (H2/H3) to break up longer emails
• Bullet points for lists
• Bold key phrases — never underline (looks like a link)
• Never use red text (triggers spam warnings)
• Avoid excessive exclamation marks!!!

IMAGE BEST PRACTICES
• Compress all images before uploading (target under 200KB per image)
• Always add alt text
• Don't send image-only emails — text must convey the message even if images don't load
• Minimum image width for header: 600px
• Recommended banner size: 1200 x 400px

MOBILE OPTIMISATION
• Use a single-column layout — multi-column breaks on small screens
• Font size minimum 14px body, 22px headings
• CTA buttons minimum 44px tall — easy to tap with a thumb
• Avoid tiny links — space out clickable elements

SEND TIME OPTIMISATION
• Tuesday, Wednesday, Thursday perform best for most industries
• Optimal send windows: 10am–12pm or 2pm–4pm (recipient's local time)
• Use MailChimp's "Send Time Optimisation" feature if available on the client's plan

SPAM AVOIDANCE CHECKLIST
[ ] Unsubscribe link present and visible
[ ] Physical address in footer
[ ] From name is recognisable (not a random string)
[ ] Sender domain is authenticated (SPF, DKIM, DMARC)
[ ] No excessive capitalisation or punctuation in subject
[ ] Text-to-image ratio is balanced (not image-only)`},

{id:"em-m2l4",title:"Email Editing & Formatting",mins:16,video:"23a4ca9a8f1d4a4c8a6ad4c58d74b18e",body:`EMAIL EDITING & FORMATTING — SOP

PURPOSE
This SOP covers the process of editing existing email campaigns or templates in MailChimp — including how to make copy edits, update images, change CTAs, and reformat layouts before sending or scheduling.

WHEN YOU'LL USE THIS
• Editing a draft campaign created by another team member
• Updating a template with new content for a recurring send (e.g. weekly newsletter)
• Revising an email based on client or internal feedback
• Fixing formatting issues found during preview/test send

OPENING AN EXISTING CAMPAIGN FOR EDITING
1. Go to Campaigns → All Campaigns
2. Find the campaign by name or date
3. Click the dropdown arrow → Edit
4. The campaign builder will open at the stage it was last saved

EDITING THE SUBJECT LINE AND PREVIEW TEXT
1. In the campaign builder, click on "Subject" section
2. Edit subject line and preview text
3. Double-check: character count, no spam words, personalisation tags correct

EDITING CONTENT BLOCKS
• Click on any block in the email preview to open its editing panel
• Text blocks: click inside to type — use the toolbar for bold, italic, links, bullet points
• Image blocks: click the image to replace it or edit the link and alt text
• Button blocks: click to update label text, URL, or colours

MOVING AND REARRANGING BLOCKS
• Hover over a block — a move icon (≡) appears on the left
• Click and drag to reorder blocks
• To delete a block: hover → click the trash icon on the right

ADDING NEW BLOCKS
• In the right sidebar, drag any block type (Text, Image, Button, Divider, Social) into the email body
• Position it between existing blocks

CHECKING LINKS
Before saving any edited campaign:
• Click on every CTA button and hyperlinked text
• Confirm the URL is correct and the page loads
• Confirm UTM parameters are present if using tracked links

APPLYING CHANGES TO A TEMPLATE (NOT A CAMPAIGN)
If you are editing a saved template:
1. Go to Content → Email Templates
2. Find the template → click Edit
3. Make changes and Save
Note: Updating a template does NOT retroactively update campaigns already created from it. Each campaign is an independent copy.

FINAL FORMATTING CHECKLIST BEFORE SAVING
[ ] Subject line and preview text complete and correct
[ ] All copy blocks edited and proof-read
[ ] All images updated with correct alt text
[ ] All CTA buttons updated with correct URLs
[ ] Footer correct (address, unsubscribe link, social icons)
[ ] Test email sent and reviewed on desktop + mobile`},

{id:"em-m2l5",title:"Email Creation & Follow-Up Procedure",mins:23,video:"8189d771e86a4392b857784037828aeb",body:`EMAIL CREATION & FOLLOW-UP PROCEDURE — SOP

PURPOSE
This SOP covers the end-to-end process of creating a marketing email from brief to scheduled send — including the follow-up steps to take after the email has been delivered to ensure we track performance and act on the results.

STAGE 1 — BRIEF & PLANNING
Before opening MailChimp, confirm the following with the team lead:
• What is the goal of this email? (Sales, traffic, awareness, survey, re-engagement)
• Who is the audience? (Full list, segment, tagged group)
• What is the offer or key message?
• Is there a deadline or specific send date/time?
• Are there assets ready? (Images, copy, offer details)

Do not begin building until these are confirmed.

STAGE 2 — CAMPAIGN CREATION
1. Create new campaign: Campaigns → Create Campaign → Email → Regular
2. Name the campaign: ClientName_Purpose_Date (e.g. SolsticeBeauty_FlashSale_2024-03-15)
3. Set To: audience or segment
4. Set From: client's branded name and verified email
5. Write subject line (40–60 chars) + preview text (85–100 chars)

STAGE 3 — EMAIL BUILD
Using a saved client template as the starting point:
1. Open Content → Email Templates → Select client template
2. Click Create Campaign from Template
3. Update all content blocks: headline, body copy, images, CTA, any offers
4. Replace any placeholder text — do a full scan of every block

STAGE 4 — INTERNAL REVIEW
Before sending or scheduling:
1. Send a test email to yourself and one other team member
2. Check on desktop (Gmail, Outlook) and mobile
3. Click every link — confirm they are working
4. Proof-read subject line, preview text, and all body copy
5. Confirm audience selection is correct
6. Confirm send time is correct (check timezone)

STAGE 5 — SCHEDULE OR SEND
• For campaigns: use Schedule to set the exact send date and time
• For urgent sends: use Send Now only if confirmed by team lead
• Log the campaign send in the client's activity tracker

STAGE 6 — FOLLOW-UP (POST-SEND)
24 Hours After Send:
• Check campaign report: Open rate, Click rate, Bounce rate, Unsubscribe rate
• Flag anything unusual to the team lead

Benchmarks to watch:
• Open rate below 20% — subject line or list health issue
• Click rate below 1.5% — CTA or content issue
• Unsubscribe rate above 0.5% — content mismatch or send frequency issue
• Bounce rate above 2% — list hygiene needed

48–72 Hours After Send:
• Capture final stats in the client's performance tracker
• Note any segments that significantly over or underperformed
• Recommend follow-up action if relevant (re-send to non-openers, segment for next campaign)`}

{id:"em-m3",title:"Module 3: Abandoned Cart Automation",lessons:[
{id:"em-m3l1",title:"Email Cutoff Flow Overview",mins:8,video:"a7a3cb3eb06c4ab99791652728754e56",body:`EMAIL CUTOFF FLOW OVERVIEW — SOP

PURPOSE
The Email Cutoff Flow is the logic that determines when a contact should stop receiving automated emails in a sequence. Without this, customers who have already purchased will continue to receive abandoned cart nudges — which is both annoying and damages brand trust.

WHAT IS AN EMAIL CUTOFF FLOW?
A cutoff flow (also called an exit or suppression logic) is a conditional step inside an automation that checks whether the contact has met a certain condition — and if they have, removes them from the journey before sending the next email.

WHEN TO APPLY CUTOFF LOGIC
Apply a cutoff at every email step in the following automation types:
• Abandoned cart sequences — exit if contact completes a purchase
• Re-engagement sequences — exit if contact opens or clicks any email
• Win-back campaigns — exit if contact makes a purchase
• Post-purchase sequences — exit if contact requests a refund

THE THREE CUTOFF CONDITIONS TO KNOW
1. Purchased — contact has completed an order in WooCommerce since entering the flow
2. Unsubscribed — contact has opted out (MailChimp handles this automatically, but verify)
3. Tag applied — a manual or automated tag has been added that disqualifies the contact

HOW TO SET UP A CUTOFF IN MAILCHIMP CUSTOMER JOURNEYS
1. In the journey builder, after a Wait step, add a Yes/No branch point
2. Set the condition: "Has purchased" or "Has tag: [specific tag]"
3. YES path → End Journey (remove from flow)
4. NO path → Continue to next email

BEST PRACTICE
Add the cutoff check BEFORE every email in the sequence — not just at the start. Contacts can purchase between email sends, and if the check only runs once at entry, they will still receive the remaining emails.

VISUAL FLOW EXAMPLE
Entry: Cart Abandoned
→ Wait 1 hour
→ Check: Purchased? YES → End | NO → Send Email 1
→ Wait 24 hours
→ Check: Purchased? YES → End | NO → Send Email 2
→ Wait 48 hours
→ Check: Purchased? YES → End | NO → Send Email 3
→ End`},

{id:"em-m3l2",title:"Abandoned Cart Email & SMS Sequence",mins:19,video:"2133b5b2affd4afd876cd87e3afb227d",body:`ABANDONED CART EMAIL & SMS SEQUENCE — SOP

PURPOSE
The abandoned cart sequence is one of the highest-ROI automations in e-commerce email marketing. Research shows 70–80% of online shopping carts are abandoned. A well-built recovery sequence recovers 5–15% of those lost sales automatically.

THE FULL SEQUENCE STRUCTURE

EMAIL 1 — Reminder (Send: 1 hour after abandonment)
Subject: "[First Name], you left something behind 👀"
Content:
• Show the exact product(s) left in cart (dynamic product block)
• Short, warm copy — no hard sell
• Single CTA button: "Complete Your Order" linking back to cart
• No discount — it's too early

EMAIL 2 — Address Hesitation (Send: 24 hours after abandonment)
Subject: "Still thinking about it?"
Content:
• Acknowledge they might have questions
• Include product benefits / reviews / social proof
• Optional: introduce a small incentive (free shipping, 5% off) — only if margin allows
• CTA button: "Go Back to Your Cart"

EMAIL 3 — Urgency Close (Send: 72 hours after abandonment)
Subject: "Last chance — your cart expires soon"
Content:
• Create urgency: limited stock, cart about to clear
• If discount offered in Email 2, reinforce or increase it slightly
• Strong CTA: "Claim Your Order Now"

SMS (Optional — Send: 30 minutes after abandonment if email is not opened)
Message format: "Hi [First Name]! You left [Product] in your cart. Complete your order here: [link] — Reply STOP to unsubscribe."

SETTING UP IN MAILCHIMP CUSTOMER JOURNEYS
1. Go to Automations → Customer Journeys → Create Journey
2. Starting Point: Abandoned Cart (requires WooCommerce site tracking active)
3. Add Email 1 step with 1-hour wait
4. Add cutoff check (Has Purchased? → Yes: End Journey)
5. Add Email 2 step with 24-hour wait
6. Add cutoff check
7. Add Email 3 step with 48-hour wait (from Email 2)
8. Add cutoff check
9. End Journey

COMPLIANCE NOTES
• All emails must include unsubscribe link
• SMS requires separate opt-in consent — do not add SMS unless the subscriber has explicitly opted into SMS communications
• Physical address required in footer`},

{id:"em-m3l3",title:"Email Abandonment Flow",mins:13,video:"c45248bd747f4adca84ee1746e7ae05f",body:`EMAIL ABANDONMENT FLOW — SOP

PURPOSE
The Email Abandonment Flow specifically handles contacts who started engaging with an email (opened it, possibly clicked) but didn't convert. This is distinct from the cart abandonment flow — here the trigger is email engagement behaviour rather than cart activity.

WHEN TO USE THIS FLOW
• After sending a promotional campaign to a segment
• When a link in an email was clicked but no purchase was made
• When a contact opened an email but did not complete a form or booking

FLOW TRIGGER OPTIONS IN MAILCHIMP
• Contact opens campaign (track opens must be enabled)
• Contact clicks a specific link in a campaign
• Contact is tagged after clicking but not converting

THE ABANDONMENT FOLLOW-UP FLOW

Trigger: Contact clicks CTA in campaign but does not purchase within X hours

STEP 1 — WAIT 2–4 HOURS
Give the contact time to convert before triggering follow-up.

STEP 2 — CHECK CONVERSION
Add a Yes/No branch:
• Has purchased? → YES: End journey
• NO: Continue

STEP 3 — SEND FOLLOW-UP EMAIL
Subject: "Did you get a chance to check this out?"
Content:
• Reference what they were looking at
• Remove friction — address common objections (shipping, returns, quality)
• Restate the offer or value proposition
• Single CTA back to the relevant page

STEP 4 — WAIT 48 HOURS
STEP 5 — CHECK CONVERSION AGAIN
STEP 6 — FINAL EMAIL (if still not converted)
Subject: "We saved your spot — but not for long"
Content:
• Urgency
• Final CTA
• After this email, do not continue the follow-up — let them exit naturally

TAGGING CONTACTS
Throughout the flow, apply tags:
• "Engaged-No-Convert" — contacts who clicked but didn't buy
• "Abandoned-Flow-Complete" — contacts who went through the full sequence without converting
• Remove the "Engaged-No-Convert" tag after the flow completes to keep audience data clean

This flow should be activated on every major promotional send where conversion tracking is in place.`},

{id:"em-m3l4",title:"Purchase Logic Flow",mins:6,video:"2e14c6389c674dea984a5c8db1db7ce6",body:`PURCHASE LOGIC FLOW — SOP

PURPOSE
The Purchase Logic Flow is the automation triggered when a contact completes a purchase. Its job is to: (1) remove the contact from any active abandoned cart or follow-up flows, (2) apply the correct "Purchased" tag, and (3) enrol the contact into the post-purchase sequence.

WHY THIS MATTERS
Without a purchase logic flow, contacts who buy will continue to receive cart recovery emails. This is a poor customer experience and wastes email quota. Worse, it signals to the customer that you don't know they've already bought.

TRIGGER
Starting Point: Contact completes a purchase (WooCommerce order status = Processing or Completed)

FLOW STEPS

STEP 1 — REMOVE FROM ACTIVE FLOWS
MailChimp Customer Journeys allows you to exit a contact from other journeys when they trigger this flow. Configure:
• Exit Contact from: [Abandoned Cart Journey], [Email Follow-Up Journey], [Re-Engagement Journey]

STEP 2 — APPLY PURCHASED TAG
• Add tag: "Purchased"
• Remove tag: "Abandoned Cart" (if present)
• Remove tag: "Engaged-No-Convert" (if present)

STEP 3 — WAIT 1 HOUR
Allow order confirmation email to be delivered first before starting marketing follow-up.

STEP 4 — ENROL IN POST-PURCHASE SEQUENCE
The post-purchase sequence typically includes:
• Email 1 (Day 1): Thank you + order summary (this may be WooCommerce transactional — confirm it's not duplicated)
• Email 2 (Day 3): How to use / getting started content
• Email 3 (Day 7): Leave a review request
• Email 4 (Day 14): Related products / upsell
• Email 5 (Day 30): Re-engagement / loyalty offer

STEP 5 — TAG AS "Post-Purchase-Sequence-Active"
Track who is in the post-purchase sequence for reporting and suppression purposes.

This flow is the backbone of the customer journey. Every e-commerce client should have it active from day one.`}

{id:"em-m4",title:"Module 4: Survey Emails",lessons:[
{id:"em-m4l1",title:"Creating a Survey Email",mins:17,video:"b6684f8dddda4443a7247feb31f3fd5f",body:`CREATING A SURVEY EMAIL — SOP

PURPOSE
Survey emails gather customer feedback directly from the email list. They are used to understand customer satisfaction, improve products/services, qualify leads, or collect testimonials. This SOP covers when and how to create a survey email campaign from scratch.

WHEN TO SEND A SURVEY EMAIL
• After a customer has received a product (7–14 days post-purchase)
• After a service has been delivered
• When launching a new product and gauging interest
• Quarterly to measure overall customer satisfaction (NPS)
• To gather case study or testimonial content

TOOLS TO USE
• Google Forms — free, simple, works with any email platform
• Typeform — more polished UI, better for conversion-focused surveys
• MailChimp's built-in Survey feature (available on certain plans)
• SurveyMonkey — enterprise option

STEP 1 — DEFINE THE SURVEY GOAL
Before building anything, confirm:
• What decision will this survey inform?
• How many questions are needed? (Keep to 3–5 maximum — fewer = more responses)
• What type of answers: multiple choice, rating scale, open text?

STEP 2 — BUILD THE SURVEY FORM
Using Google Forms or Typeform:
1. Create a new form
2. Title it clearly (internal reference — not necessarily what the user sees)
3. Add a friendly intro message
4. Add 3–5 questions — keep them focused and specific
5. Add a thank-you / completion message
6. Copy the survey link

Recommended question types:
• "How satisfied are you with [product/service]?" — 1–5 star rating
• "What did you like most about your experience?" — open text
• "Is there anything we could have done better?" — open text
• "Would you recommend us to a friend?" — Yes / No / Maybe

STEP 3 — BUILD THE EMAIL IN MAILCHIMP
Subject line options:
• "We'd love your feedback — 2 minutes of your time?"
• "Quick question for you, [First Name]"
• "How was your experience with us?"

Email structure:
1. Personalised greeting: "Hi [First Name],"
2. Short intro: why you're asking and how long it takes (be honest — "2 minutes")
3. One prominent CTA button: "Share Your Feedback" → links to the survey
4. Optional: small incentive for completing ("Enter a draw for a £50 gift card")
5. Thank them in advance

STEP 4 — SELECT THE CORRECT AUDIENCE SEGMENT
• Send only to customers who have completed a purchase or received a service
• Do NOT send survey emails to cold contacts or leads who have never bought

STEP 5 — SCHEDULE AND SEND
• Best time for survey emails: Tuesday or Wednesday, 10am–12pm
• Do not send more than one survey email per quarter per contact`},

{id:"em-m4l2",title:"Creating a Survey Email Using MailChimp",mins:18,video:"455b93f8f3ea467f807f04d02eb11802",body:`CREATING A SURVEY EMAIL USING MAILCHIMP — SOP

PURPOSE
This SOP specifically covers how to create a survey email using MailChimp's native survey and poll features, including embedding a question directly inside the email body — which increases response rates by removing the friction of clicking through to an external form.

MAILCHIMP SURVEY OPTIONS
MailChimp offers two native methods:

1. Embedded Poll — a single-question poll directly in the email body. Contact clicks an answer option inside the email. Response is recorded automatically. No external form needed.

2. Survey Link — a multi-question survey hosted on a MailChimp-generated page. Contact clicks a button in the email and completes the survey in their browser.

WHEN TO USE EACH
• Embedded Poll: for quick NPS-style or yes/no questions. High completion rate. Good for: "Would you recommend us? Yes / Maybe / No"
• Survey Link: for multi-question surveys where you need more detailed data.

METHOD 1 — BUILDING AN EMBEDDED POLL INSIDE AN EMAIL

STEP 1 — Create a new email campaign (Regular or Automated)
STEP 2 — In the email builder, drag a "Survey" content block into the body
STEP 3 — Click the block to edit:
  • Enter your survey question
  • Add answer options (2–5 options)
  • Set a thank-you message for after the click
STEP 4 — The poll results are tracked in the Campaign Report under "Survey Responses"

METHOD 2 — BUILDING A MULTI-QUESTION SURVEY VIA MAILCHIMP

STEP 1 — Go to Campaigns → Surveys → Create Survey
STEP 2 — Add your questions (text, rating, multiple choice)
STEP 3 — Customise the survey page (add logo, brand colours)
STEP 4 — Copy the survey URL
STEP 5 — In a new email campaign, create a button CTA linking to the survey URL
STEP 6 — In the email copy, set clear expectations: "This takes 2 minutes"

TRACKING SURVEY RESULTS
• Embedded Poll responses: Campaign → Reports → Survey Responses tab
• Survey page responses: Campaigns → Surveys → View Results
• Export results to CSV for client reporting

REPORTING TO THE CLIENT
After the survey closes (7–14 days after send):
• Export the results
• Summarise key findings in a short written summary (3–5 bullet points)
• Share with the client and recommend any actions based on the feedback

Common findings to highlight:
• Overall satisfaction score
• Most frequently mentioned positive (what to keep doing)
• Most frequently mentioned negative (what to fix)
• Any verbatim quotes suitable for testimonials`}

{id:"cc1",title:"CapCut — Interface & Core Editing",lessons:[
{id:"cc1l1",title:"CapCut Interface Overview",mins:7,body:`GETTING STARTED IN CAPCUT

CapCut is our primary video editing tool for client content. Logins will be shared via the Google Doc — do not create your own account for client work.

THE MAIN SECTIONS (top toolbar)
• Media — where you import video clips, images, and audio
• Audio — sound effects library and background music
  - To add sound effects: type the effect name in the search (e.g. "whoosh") → preview → tap to add
  - To add background music: browse by genre (rock, chill, etc.) → drag to audio track
• Text — add text overlays, titles, and subtitles
• Stickers — animated overlay elements (use sparingly and purposefully for client content)
• Effects — visual filters and transitions that affect the overall video appearance

THE TIMELINE
The timeline at the bottom is where you edit. Each video clip, audio file, and text element appears as a separate track.
• To trim: tap the clip → drag the edges to shorten from either end
• To split: position the playhead where you want to cut → tap "Split"
• To delete: tap the clip → tap the bin icon
• To rearrange: tap and hold → drag to new position

TRANSITIONS
Tap the small icon between two clips to add a transition. Keep transitions subtle for client content — hard cuts usually look more professional than flashy wipes.`},
{id:"cc1l2",title:"Editing Client Ad Videos",mins:9,body:`EDITING ADS IN CAPCUT — STEP BY STEP

BEFORE YOU START
• Have the raw footage ready (uploaded to Drive or shared directly)
• Have the ad brief — what is the hook, what are the key talking points, what is the CTA?
• Know the target format: 9:16 for Reels/Stories, 1:1 for Feed, 16:9 for YouTube

WORKFLOW
1. Open a new project → import all clips
2. Arrange clips in the correct order on the timeline
3. Cut dead moments — any pauses, filler words ("um", "uh"), or off-topic sections
4. The hook must be compelling in the first 3 seconds — if the first clip doesn't grab attention, cut it shorter or find a stronger opening moment
5. Add captions (covered in the Submagic module)
6. Add background music if appropriate — keep it low (around 10-20% volume so the voice is always the dominant audio)
7. Add any text overlays for key points — this helps when viewed with sound off
8. Review the full video at least once before exporting
9. Export at maximum quality for the correct aspect ratio

THINGS TO AVOID
✗ Over-editing — raw, authentic content often performs better for ads than heavily produced videos
✗ Too many transitions — use hard cuts 90% of the time
✗ Music too loud — the voice must always be the main audio
✗ Captions that block the speaker's face
✗ Aspect ratio mismatch — always check format before exporting`}

{q:"What should you do with dead moments and filler words in footage?",opts:["Leave them in for authenticity","Cut them out to keep the video tight","Add music over them","Speed them up"],ans:1},
{q:"Why is the first 3 seconds of an ad video most important?",opts:["Meta charges more after 3 seconds","The hook must grab attention or viewers scroll away","Captions only appear after 3 seconds","The algorithm stops showing ads after 3 seconds"],ans:1}
]}},
{id:"cc2",title:"Submagic — Auto Captions",lessons:[
{id:"cc2l1",title:"Using Submagic for Captions",mins:7,body:`WHY CAPTIONS MATTER

Most people watch social media videos with the sound off. Captions are not optional — they are essential for any video that will run as a Meta ad or organic social content.

SUBMAGIC VS CAPCUT CAPTIONS
CapCut has a built-in auto-caption feature but Submagic produces significantly more accurate captions with better styling options. For all client ad content, use Submagic.

THE SUBMAGIC WORKFLOW
1. Export your edited video from CapCut (without captions — export the clean edit first)
2. Upload the video to Submagic
3. Submagic auto-transcribes and generates captions — wait for processing to complete
4. Review and edit any incorrectly transcribed words (proper nouns, brand names, and technical terms are most likely to be wrong)
5. Style the captions: position them in the safe zone (roughly the middle third of the screen — not too high, not too low)
6. Choose a caption style appropriate for the content: bold white text with drop shadow for ads, or more styled for organic content
7. Export the captioned video

CAPTION POSITIONING RULES
• Do NOT position captions over the speaker's face
• Keep captions within Meta's safe zones (the centre area where captions won't be cropped on different placements)
• For 9:16 format: position captions roughly at 60-70% height from the top
• Test on both iPhone and Android screen sizes if possible

REVIEWING BEFORE DELIVERY
Always watch the full captioned video before delivering to the client. Incorrect captions look unprofessional and can confuse the message.`}
],quiz:{id:"cc2q",title:"Submagic Quiz",qs:[
{q:"Why should Submagic be used instead of CapCut's built-in captions?",opts:["Submagic is free and CapCut is not","Submagic produces more accurate captions with better styling","CapCut cannot add captions","Submagic is faster"],ans:1},
{q:"What should you export from CapCut before uploading to Submagic?",opts:["The video with captions already added","A clean edited video without captions","A rough cut without any editing","Just the audio track"],ans:1},
{q:"Where should captions be positioned for 9:16 video ads?",opts:["At the very top of the screen","Over the speaker's face for emphasis","In the safe zone — approximately 60-70% height from top","At the very bottom"],ans:2},
{q:"What types of words are most likely to be transcribed incorrectly by Submagic?",opts:["Common words like 'the' and 'and'","Proper nouns, brand names, and technical terms","Short sentences","Questions"],ans:2}
]}}
]},

{id:"ga1",title:"Account Setup & Best Practices",lessons:[
{id:"ga1l1",title:"Google Ads Account Configuration",mins:8,body:`GOOGLE IS GETTING STRICTER EVERY MONTH

Google actively suspends accounts that aren't properly set up. These steps aren't optional — they are what keeps the client's account active.

If you do not already have access to a Google Ads account for the client, go to ads.google.com and either get added as a user to their existing account or help them create one.

STEP 1 — ACCOUNT NAME & PREFERENCES
Tools and Settings → Preferences
• Name the ad account exactly the same as the business — no abbreviations, no codes
• Ensure all contact information is completely filled out
• Expand "Contact Information" and verify everything is complete

STEP 2 — BILLING SETTINGS
Tools and Settings → Billing Settings
• Ensure billing is fully set up with all contact information
• A billing issue is the fastest way to get campaigns paused mid-flight

STEP 3 — ADVERTISER VERIFICATION (CRITICAL)
Apply for Advertiser Verification immediately.
Google gives a 2-3 week window to complete this verification. If it's not done in time, the account gets suspended. Suspended accounts are very difficult to recover.
Do not wait to be notified — apply the moment you have account access.

STEP 4 — MERCHANT CENTER (FOR E-COMMERCE CLIENTS)
If the client sells products online:
• Set up Google Merchant Center and link it to the Ads account
• Ensure product feed is connected and products are approved
• Fix any policy violations before launching Shopping campaigns

STEP 5 — CONVERSION TRACKING
Set up conversion tracking before any campaign goes live. Without it, you have no data on what's actually converting.`},
{id:"ga1l2",title:"Building a Branded Search Campaign",mins:10,body:`WHAT IS A BRANDED SEARCH CAMPAIGN?

A branded search campaign ensures your client's brand appears at the top of Google search results when someone searches for their brand name directly. This protects them from competitors bidding on their brand terms.

STEP 1 — CREATE A NEW CAMPAIGN
• Click the blue "+" button → New Campaign
• Select "No Goal" to see all campaign options
• Choose "Search Campaign"
• Add Goal: Purchases (conversion goal)

STEP 2 — CAMPAIGN SETTINGS
• Enter the homepage URL
• Name: [Company Initials] — Search Branded
• Bidding strategy: Max Conversions
• Disable Display Network — you want search only
• Location targeting: expand options → select "Presence" → target only people physically in the target location
• Language: English (or relevant language)

STEP 3 — KEYWORD SELECTION
Use ONLY brand name and direct variations:
• Exact match: ["Brand Name"]
• Phrase match: ["Brand Name products"]
• Broad match: [Brand Name]
Create three separate ad groups — one for each match type.

STEP 4 — AD CREATION
Headlines (create 3):
1. Brand name
2. What they sell + who they sell it to
3. Call to action ("Shop [Product] Today")

Descriptions (create 2):
1. What they sell + who for
2. Call to action with product/service name

STEP 5 — AD EXTENSIONS
• Site Links — add unique URLs (use /#1, /#2, etc. if no dedicated pages exist). More site links = more real estate on the search results page.
• Structured Snippets — add product/service categories (e.g. "Styles: Minimal, Bold, Classic")

STEP 6 — FINAL REVIEW
Before publishing: verify the homepage URL is correct, display network is disabled, location targeting is set to Presence only, budget is set, conversion tracking is active.`}

{id:"squarespace",icon:"🌐",color:"#0EA5E9",tagBg:"rgba(14,165,233,0.12)",tagCol:"#38BDF8",tag:"WEB",title:"Squarespace & Domain Setup",
desc:"Connect client domains to Squarespace websites. GoDaddy domain transfer, DNS configuration, and troubleshooting common connection issues.",
modules:[
{id:"sq1",title:"Domain Transfer & DNS Setup",lessons:[
{id:"sq1l1",title:"Connecting a GoDaddy Domain to Squarespace",mins:8,body:`WHAT YOU'RE DOING AND WHY

When a client has bought their domain from GoDaddy (or another registrar) but their website is on Squarespace, you need to point the domain at Squarespace's servers. This is called domain connection (not transfer — you're not moving the domain, just pointing it).

The same process applies for other registrars (Wix, Namecheap, etc.) — the interface differs but the logic is identical. If you encounter a registrar you haven't seen before and can't figure it out, flag it to Samuel or Caleb immediately.

WHAT YOU NEED BEFORE STARTING
• GoDaddy login for the client
• Squarespace login for the client
• The client's domain name

STEP-BY-STEP PROCESS

IN SQUARESPACE
1. Go to Pages → Not Linked → Connect Domain (or Website → Domains → Use a domain I own)
2. Type in the client's domain name
3. Squarespace will show you the nameservers you need to copy — these look like: ns1.squarespace.com, ns2.squarespace.com, etc.
4. Copy these nameservers — you'll need them in GoDaddy

IN GODADDY
1. Log into the client's GoDaddy account
2. Go to Domains → Manage → find the domain → click DNS
3. Go to Nameservers → click "Change"
4. Select "I'll use my own nameservers"
5. Delete the existing nameservers
6. Paste in the Squarespace nameservers one by one
7. Save

WHAT HAPPENS NEXT
DNS propagation takes up to 48 hours. The domain should start working within a few hours in most cases. The client may see their site loading intermittently during this window — this is normal.`},
{id:"sq1l2",title:"Troubleshooting & Other Registrars",mins:5,body:`COMMON ISSUES AND HOW TO FIX THEM

ISSUE: Domain still not connected after 48 hours
• Double-check the nameservers were saved correctly in GoDaddy — common mistake is a typo or an extra space
• In Squarespace, go to Domains and check the connection status — it will show an error message if something is wrong
• Try removing and re-adding the domain in Squarespace

ISSUE: Only some pages load, others show an error
• The nameservers are pointing correctly but some DNS records may still be propagating
• Wait another 12-24 hours — this usually resolves itself
• If not, check if any custom CNAME or A records need to be added alongside the nameservers

ISSUE: The client has an SSL certificate error (padlock icon not showing)
• SSL certificates take up to 72 hours after DNS connection to provision
• In Squarespace, go to Settings → SSL — check the status and force a re-check if needed

OTHER REGISTRARS — GENERAL PROCESS
The nameserver change process is the same across all registrars:
1. Find the "DNS" or "Nameservers" section in the registrar's dashboard
2. Change to "Custom Nameservers" or "Use my own nameservers"
3. Enter the Squarespace nameservers
4. Save

Wix, Namecheap, and Google Domains all follow this same pattern with slightly different UI. When in doubt, search YouTube for "[Registrar Name] + Squarespace nameservers" — there will always be an up-to-date tutorial.`}

{id:"imgcreatives",icon:"🖼️",color:"#8B5CF6",tagBg:"rgba(139,92,246,0.12)",tagCol:"#C4B5FD",tag:"IMAGE ADS",title:"Image Ad Creatives",

{id:"ia-m1",title:"Module 1: Creating Image Ads with Canva",lessons:[
{id:"ia-m1l1",title:"Creating Image Ads — Full Canva Workflow",mins:33,video:"76d90b9a2b464e5abf55dc7541450d54",body:`CREATING IMAGE ADS WITH CANVA — SOP

OBJECTIVE
Create high-quality image ads for clients using Canva templates and market research efficiently. Each image ad should be completed within 30 minutes.

STEP 1 — PREPARE FOR IMAGE AD CREATION
• Ensure you have completed the necessary market research for the client
• Gather image and video ad examples relevant to the client's industry
• Review competitor ads and successful creatives from the client's niche

STEP 2 — UTILISE TEMPLATES FOR EFFICIENCY
• Use Canva templates or pre-existing templates in the designated folder
• Aim to complete each image ad within 30 minutes to maintain efficiency
• Do not start from scratch — always begin with a template

STEP 3 — LIMIT TEXT IN ADS
• Keep text minimal; focus on copy-pasting relevant information from your market research
• Avoid cluttering the ad with excessive text
• Meta image ads perform best when text takes up less than 20% of the visual

STEP 4 — CREATE IMAGE CONCEPTS
• Focus on creating image concepts based on the client's needs and available resources
• If specific images are required but unavailable, adapt the concept using available images
• Think in terms of persona (who is seeing this?) and angle (what message does it convey?)

STEP 5 — ACCESS CANVA AND SELECT A TEMPLATE
• Log into Canva and navigate to the 'Create' section
• Choose a suitable template from the projects folder
• Ensure the format matches the placement (e.g., 1:1 for feed, 9:16 for stories/reels)

STEP 6 — CUSTOMISE THE TEMPLATE
• Insert relevant images and adjust text overlays according to the client's branding
• Ensure the text is legible and appropriately sized
• Replace all placeholder text and images — nothing generic should remain

STEP 7 — FINALISE THE AD DESIGN
• Make necessary adjustments to colours, fonts, and layout to enhance visual appeal
• Ensure the ad communicates the client's value proposition clearly
• Check that the call to action is prominent and specific (e.g., "Book A Free Consultation", "Shop Now")

STEP 8 — LABEL AND UPLOAD THE AD
• Download the completed ad in PNG format
• Label the file with the persona and angle (e.g., 'Persona X — Angle Y') before uploading to Google Drive or Frame.io
• Organise the file into the correct client folder

STEP 9 — REVIEW AND FEEDBACK
• Conduct a review of the ad to ensure it meets quality standards
• Gather feedback from team members and make necessary adjustments before submission

CAUTIONARY NOTES
• Avoid using too much text in the ads — keep it concise and impactful
• Ensure all images used are high quality and relevant to the client's services

TIPS FOR EFFICIENCY
• Use templates to save time and maintain consistency across ads
• Limit the number of revisions by gathering all necessary information before starting
• Regularly check for updates in the template folder to utilise the latest designs`}

{id:"ia-m2",title:"Module 2: Labelling & Organising Image Ads",lessons:[
{id:"ia-m2l1",title:"Labelling Image Ads — Naming Conventions & Organisation",mins:8,video:"bad98ecee7df419aaa043cbb8e5fb1f1",body:`LABELLING IMAGE ADS — SOP

OBJECTIVE
Ensure all image ads are consistently labelled with the correct persona, angle, and date so they can be easily identified, organised, and integrated into ad campaigns.

STEP 1 — CREATE THE IMAGE AD
• Begin by creating the image ad using your preferred design software (Canva)
• Ensure the ad aligns with the intended persona and angle before downloading

STEP 2 — DOWNLOAD THE IMAGE AD
• Download the completed image ad in PNG format

STEP 3 — UPLOAD TO GOOGLE DRIVE
• Navigate to Google Drive and select the appropriate workspace
• Locate the folder for the specific client and campaign
• Do not drop files into the wrong client folder — always double-check before uploading

STEP 4 — LABEL THE IMAGE AD
• Change the file name to include the date, persona, and angle
• Format: date - persona - angle
  Example: 2024-06-01 - Parent with Daughter - Testimonial
• Use real, research-backed examples — do not make up generic personas

STEP 5 — IDENTIFY PERSONA AND ANGLE
• Persona: who the ad is targeting (e.g., "Parent with Daughter", "Young Professional", "Homeowner")
• Angle: the message or approach the ad takes (e.g., "Testimonial", "Adaptable Mentor", "Price vs Value", "Social Proof")
• If unsure of the persona or angle, send the ad to Claude for assistance

STEP 6 — FINALISE NAMING CONVENTION
• Ensure the naming convention is clear and concise for easy identification in campaigns
• Consistent naming means anyone on the team can identify the ad without opening it

STEP 7 — PREPARE FOR AD CAMPAIGNS
• Once labelled, the ads can be easily integrated into Meta ad campaigns
• Check the Meta Ads section of the academy for further instructions on campaign setup

CAUTIONARY NOTES
• Always ensure that the persona and angle are accurately reflected in the ad to maximise effectiveness
• Avoid using vague or generic labels that do not provide clear insights into the ad's purpose

TIPS FOR EFFICIENCY
• Use templates for naming conventions to save time
• Regularly review and update persona and angle definitions based on market research to stay relevant`}
],quiz:{id:"ia-m2q",title:"Module 2 Quiz — Labelling Image Ads",qs:[
{q:"What is the correct file naming format for image ads?",opts:["ad-number-client-type","date - persona - angle","persona_angle_version","client - campaign - draft"],ans:1},
{q:"What is a 'persona' in the context of image ads?",opts:["The design style of the ad","The colour scheme used","Who the ad is targeting","The platform the ad runs on"],ans:2},
{q:"What is an 'angle' in the context of image ads?",opts:["The rotation of text in the design","The message or approach the ad takes","The aspect ratio of the image","The pixel dimensions"],ans:1},
{q:"What should you do if you are unsure of the correct persona or angle for an ad?",opts:["Label it 'Unknown' and move on","Send the image to Claude for assistance","Ask the client to label it","Skip the label entirely"],ans:1},
{q:"Where should completed image ads be uploaded after labelling?",opts:["Directly to Meta Ads Manager","The appropriate client folder in Google Drive","Your personal desktop","Frame.io only"],ans:1}

{id:"ia-m3",title:"Module 3: Reviewing & Refining Image Ads",lessons:[
{id:"ia-m3l1",title:"Reviewing Successful Elements & Refining Ad Quality",mins:12,video:"9f2358e9b7c248dd844a50f39d0f5a76",body:`REVIEWING & REFINING IMAGE ADS — SOP

OBJECTIVE
Ensure every image ad submitted is clear, specific, on-brand, and built to convert. This SOP covers how to critically review ads before submission and how to apply proven principles to improve quality.

1. REVIEW SUCCESSFUL ELEMENTS OF IMAGE ADS
Identify what has worked well in previous image ads, such as:
• Clean, high-quality images
• Positive reviews displayed prominently
• Effective background scenes that reinforce the service
• Strong, specific headlines

2. COMMUNICATE VALUE CLEARLY
• Ensure the ad communicates the value proposition clearly
• Avoid vague phrases (e.g., 'emotions through visuals' is too abstract)
• Instead, use specific calls to action:
  — 'Get your consultation for free!'
  — 'Book now for videography services!'
  — 'See how we helped 50+ businesses grow'

3. REMOVE UNNECESSARY LINKS
• Do not include website links in the image if they are auto-linked in the platform
• Focus on the primary text and headlines instead
• Cluttered design reduces conversion — keep it clean

4. LABEL IMAGE ADS APPROPRIATELY
• Before submitting an image ad, rename the file to include the correct persona and angle
• Format: 'Persona X — Angle Y'
• If unsure, send the image to Claude for assistance

5. USE CLAUDE FOR PERSONA AND ANGLE GENERATION
• If you are unsure about the persona or angle, send the image to Claude for assistance in generating these details
• Claude can identify the target audience and suggest appropriate angles based on the visual and copy

6. ENSURE SPECIFICITY IN COMMUNICATION
• Make sure the ad clearly communicates what the business does
• Avoid generic terms — ensure the service is identifiable at a glance
• A viewer should understand the offer within 3 seconds of seeing the ad

7. MAINTAIN VARIATION IN ADS
• Avoid repetitive slogans or images — variety keeps the audience engaged
• Test different visual styles, background colours, and CTA text
• Rotating creatives prevents ad fatigue

8. FOCUS ON FINE DETAILS
• Pay attention to spelling, spacing, and font consistency
• Ensure that the value provided by the company is clear and specific in every element

9. INCLUDE CLEAR CALLS TO ACTION
• Ensure every ad has a clear call to action
• Make it easy for potential clients to understand what to do next
• Examples: "Book A Call Now", "Get A Free Quote", "Shop The Collection"

10. REVIEW AND EDIT FOR TYPOS
• Always proofread your ads for typos and grammatical errors before submission
• Read the ad out loud — errors are easier to catch this way

11. ORGANISE ADS IN CLIENT FOLDERS
• After approval, save the image ad in the appropriate client folder for easy access

12. USE USER-GENERATED CONTENT
• Whenever possible, include UGC (real customer photos, real reviews) to enhance authenticity
• UGC consistently outperforms polished stock-image ads on Meta

13. TEST MULTIPLE ANGLES AND PERSONAS
• When creating ads, test various angles and personas to identify which resonates best
• Do not assume — let the data tell you which creative wins`}

{id:"mc1l1",title:"Creating & Managing Meta Ads — Full Walkthrough",mins:22,video:"9957faeb09f64530837438d1a057dc4c",body:`CREATING AND MANAGING META ADS — FULL WALKTHROUGH SOP

OBJECTIVE
Create a complete Meta Ads campaign from scratch — from business portfolio setup through to publishing the first ad.

META ADS STRUCTURE
Three levels you must always remember:
• Campaign → the objective (what Meta optimises for)
• Ad Set → the audience, budget, schedule, placements
• Ad → the actual creative: image/video + copy

STEP 1 — SET UP YOUR META BUSINESS PORTFOLIO
If starting fresh:
• Go to business.facebook.com → Create Account
• Enter your business name, your name, and your business email
• Connect your Facebook Page and Instagram account (Settings → Accounts → Pages / Instagram)
• Create your Ad Account: Settings → Accounts → Ad Accounts → Add → Create New
  Set ad account name, time zone, currency → assign to your business → add payment

STEP 2 — CHOOSE YOUR CAMPAIGN OBJECTIVE
Go to Ads Manager → Create → choose objective:
• Awareness — brand visibility only
• Traffic — driving website visits (not ideal for lead gen)
• Engagement — post interactions, video views
• Leads — collecting contacts via forms or website events ← most VirtueCore clients
• Sales — optimising for purchase events

STEP 3 — AD SET SETUP
Name format: [Date] | [Persona] | [Angle] | [Settings] | [Audience Type]
• Location: target the client's specific geography
• Age & Gender: based on ICP from market research
• Detailed Targeting: use interests/behaviours or leave broad and let Meta's algorithm work
• Budget: set at ad set level (ABO) — enough for 1-2 results per day minimum
• Schedule: set start date to TOMORROW MORNING — never launch same evening
• Placements: use Advantage+ Placements (automatic optimisation)

STEP 4 — CREATING THE AD
• Select your Facebook Page and Instagram account
• Choose format: Single Image, Video, or Carousel
• Upload your creative asset
• Write Primary Text (your main copy)
• Write Headline (5-8 words, punchy)
• Write Description (short trust tags)
• Select Call to Action button (e.g., 'Learn More', 'Book Now', 'Sign Up')
• Preview on all placements before publishing → Hit Publish

STEP 5 — TRACKING PERFORMANCE
Key metrics to monitor in Ads Manager → Ads Reporting:
• Cost Per Result (CPR/CPL) — primary scorecard
• Frequency — how many times each person has seen your ad
• Reach & Impressions — overall exposure
• CTR (Click Through Rate) — quality of creative/audience match
• Hook Rate — 3-second video plays ÷ impressions (video ads only)

CAUTIONARY NOTES
• Ensure compliance with Meta advertising policies before publishing
• Avoid over-targeting with narrow audiences — broad often outperforms
• Always start with a small test budget before scaling`}

{id:"mc2",title:"Module 2: Setting Up & Testing the Meta Pixel",lessons:[
{id:"mc2l1",title:"Pixel Installation, Testing & Verification",mins:25,video:"15d64a266ce746cc823c16ac8c5ee719",body:`SETTING UP AND TESTING META PIXEL — SOP

OBJECTIVE
Set up the Meta Pixel on a client's website and verify it is correctly tracking all key events before any ads go live.

PART 1 — INSTALL THE PIXEL HELPER EXTENSION
• Open Chrome → navigate to the Chrome Web Store
• Search for 'Meta Pixel Helper' → Add to Chrome → Pin the extension
• This shows you exactly which pixels are firing on any webpage

PART 2 — CHECK IF THE CLIENT ALREADY HAS A PIXEL
• Visit the client's website
• Click the Pixel Helper extension icon in your browser toolbar
• If it shows a pixel with events firing → pixel is already installed
• If it shows 'No Pixels Found on this page' → you need to install one

PART 3 — TEST AN EXISTING PIXEL VIA ADS MANAGER
• Go to Meta Ads Manager → Events Manager (left sidebar)
• Select the client's Dataset (pixel)
• Click 'Test Events' tab
• Enter the client's website URL → click Open Website
• Navigate the site as a customer (fill out a form, visit the thank-you page)
• Confirm each action appears in the Test Events panel exactly once
• If events fire twice → double-firing issue (see Module 4 — Pixel Settings)

PART 4 — CREATE A NEW PIXEL (if none exists)
• Go to Events Manager → click 'Connect Data' → Web → Get Started
• Choose partner integration:
  — WordPress: install the Meta Pixel plugin
  — Shopify: connect via the Meta sales channel in Shopify Settings
  — GHL (GoHighLevel): paste pixel ID into Settings → Integrations → Facebook Pixel
  — Other: use Google Tag Manager (15% lower cost per result according to Meta)
• Name the pixel: [ClientName] Pixel → click Create
• Follow the prompts for your chosen platform

PART 5 — VERIFY INSTALLATION
• Return to Events Manager → Test Events
• Repeat the customer journey on the client's website
• Confirm all key events fire correctly: PageView, Lead, Schedule, Purchase
• Check Event Match Quality (EMQ) score — aim for 5+ out of 9.3

CAUTIONARY NOTES
• Always confirm the pixel is firing correctly BEFORE launching any ads
• If the client is on Shopify, GHL, or WordPress — do NOT use manual code AND automatic matching together (causes double-firing)
• Use the correct live website URL when testing — staging sites may not match the live pixel`}

{id:"mc3",title:"Module 3: Client Onboarding — Attaching a Client's Meta ID",lessons:[
{id:"mc3l1",title:"Attaching a Client's Meta Ad Account to Your Portfolio",mins:6,video:"8d9833c4b2654f6f85991a89eccb4e84",body:`ATTACHING A CLIENT'S META ID — SOP

OBJECTIVE
Attach a client's Meta Ad Account to VirtueCore's Business Portfolio so you have full access to manage their campaigns.

STEP 1 — ACCESS THE CLIENT MANAGEMENT SHEET
• Locate the client's management sheet in the shared drive
• Navigate to the 'Client' section to find their Meta Ad Account ID
• If the ID is not there, log into Typeform using the provided credentials and go to: Content → Forms → Passwords Form

STEP 2 — COPY THE META AD ACCOUNT ID
• Find the client's Meta Ad ID in the management sheet
• Copy the full numeric ID — it looks like a 15-digit number

STEP 3 — OPEN META ADS MANAGER → BUSINESS SETTINGS
• Go to Ads Manager and select the VirtueCore portfolio (top-left dropdown)
• Navigate to Business Settings (gear icon in the left sidebar)

STEP 4 — ADD THE AD ACCOUNT
• In Business Settings, go to Accounts → Ad Accounts
• Click + Add → Request Access to an Ad Account in Another Business Portfolio
• Paste the copied Meta Ad ID → click Next
• Request Full Control → click Done

STEP 5 — NOTIFY THE CLIENT TO APPROVE
• Inform the client to check their Meta Business Suite notifications or email
• They must click Approve on the access request before you can manage the account

STEP 6 — REQUEST ACCESS TO PAGES & INSTAGRAM
Once the ad account is accepted:
• Go to Accounts → Pages → Add → Request Shared Access to a Facebook Page
• Enter the client's Facebook page URL → request all access → Done
• Go to Accounts → Instagram Accounts → Add → Claim Instagram Account
• Follow the same process

STEP 7 — TROUBLESHOOT ACCESS ISSUES
If the client can't see the request, guide them to:
• Go to their Facebook Page or Instagram → Settings → Assign Partner / Assign People → select VirtueCore and grant Full Control

STEP 8 — THIRD-PARTY PLATFORMS
If the client uses Shopify, WordPress, WooCommerce or Wix:
• Log into their website backend using credentials from the management sheet
• Confirm you have access before setting up pixel integrations

CAUTIONARY NOTES
• Always double-check all IDs and URLs — one wrong digit causes the request to fail
• Handle all client credentials confidentially — never store passwords outside approved systems
• Never create ad accounts on behalf of clients — always access the one they already own`}

{id:"mc4",title:"Module 4: Pixel Settings & Data Quality",lessons:[
{id:"mc4l1",title:"Configuring Pixel Settings for Maximum Data Quality",mins:10,video:"6c2a6308cf6440a5a2427c6409e19e9a",body:`PIXEL SETTINGS STANDARD OPERATING PROCEDURE

OBJECTIVE
Configure pixel settings correctly to maximise data quality and prevent tracking errors on every new client account.

THE THREE KEY SETTINGS TO CHECK

1. AUTOMATIC WEBSITE MATCHING — TURN ON
• In Events Manager → select your Dataset → Settings tab
• Find 'Automatic Website Matching' and ensure it is ON
• Expand 'Show customer information parameters' and turn ALL toggles ON
• This passes maximum customer data to Meta (hashed for privacy) and dramatically improves Event Match Quality (EMQ)

2. TRACK EVENTS AUTOMATICALLY WITHOUT CODE — TURN OFF
• This setting is ON by default and causes double-firing on Shopify, GHL, and WordPress
• Find it in Settings and switch it OFF
• COMMON MISTAKE: If events fire twice, this is almost always the cause

3. EVENT MATCH QUALITY (EMQ) SCORE
• Check this score for key events: Lead, Purchase, Schedule
• Maximum score is 9.3 — higher is always better
• Score below 5 = insufficient data reaching Meta. Investigate immediately.
• Score above 7 = excellent. Maintain it.
• Low EMQ is caused by: cookie blocking, privacy updates, insufficient user data from forms

HOW TO IMPROVE A LOW EMQ SCORE
• Ensure your Typeform/intake form collects: first name, last name, email, phone number
• These fields should be sent directly to Meta via Zapier or native integration
• Consider implementing a Conversions API (CAPI) gateway if EMQ stays below 5

CHECKING THE CONVERSIONS API STATUS
• In Events Manager → Settings → scroll to 'Conversions API' section
• It should show Active with a recent 'Last received' timestamp
• If using GHL/Shopify/WordPress plugins, CAPI is usually included automatically

SHARING THE PIXEL WITH YOUR AD ACCOUNT
• If a pixel doesn't appear in your ad account, you may need to share it
• Go to Events Manager → your Dataset → Settings → scroll to 'Sharing'
• Click 'Share with an Ad Account' and add your VirtueCore ad account ID

MONITORING REGULARLY
• Check pixel settings whenever a new client is onboarded
• Review EMQ scores monthly — they can drop if a client changes their website platform
• Watch the event history graph — sudden drops in events = pixel issue`}

{id:"mc5",title:"Module 5: Market Research for Meta Ads",lessons:[
{id:"mc5l1",title:"Market Research SOP — The Ad Library Method",mins:27,video:"365a5557b2994779a9707b0fcb85b163",body:`MARKET RESEARCH SOP FOR META ADS

OBJECTIVE
Conduct structured market research for every new client before creating any ads. Research informs everything: who you target, what you say, and how you say it.

WHAT YOUR RESEARCH MUST ANSWER
• Who are the top 1-4 ideal customer personas (ICPs)?
• What are the top 1-4 angles — the main reasons people buy?
• What are the top hesitations — what almost stops them buying?
• What awareness/sophistication level is the audience at?
• What tone, language, and copy length should you use?
• What visuals/imagery will they relate to?
• What emotional triggers will get them to act?

STEP 1 — ACCESS THE META ADS PLAYBOOK
• Locate the Meta Ads Playbook in your Google Drive
• Familiarise yourself with the research checklist before starting

STEP 2 — IDENTIFY THE TARGET AUDIENCE
• Review the client's onboarding Typeform for ICP details
• Goal: identify "hot leads" — people most likely to convert, not just interested people

STEP 3 — ANALYSE COMPETITOR ADS IN THE META AD LIBRARY
• Go to Meta Ad Library: facebook.com/ads/library
• Search for competitors similar to the client's business
• Filter by: country, platform (Facebook/Instagram), media type (Images or Video)
• Focus on ads running 3+ months — longevity usually means profitability
• Note: angles, headlines, offers, copy length, visual style, CTA

STEP 4 — INSPECT ADS FOR DEEPER DATA
• Right-click on a competitor ad → Inspect → Network tab
• Click the video to play it → right-click the video file in the Network list → Open in new tab
• Study: what angles are used? What makes this ad run for months?

STEP 5 — RESEARCH COMPETITOR REVIEWS
• Search the competitor on Google, Trustpilot, Reddit
• Read 3-star reviews — they give the most nuanced insight (both praise and pain points)
• Note exact language customers use — these become your ad headlines and copy

STEP 6 — COMPILE INTO A CLAUDE DOCUMENT
• Open Claude.ai
• Paste in: competitor ad details, customer reviews, client background info
• Ask: "Act as a Senior Creative Strategist. Give me a full breakdown of angles, pain points, hooks, emotions, and techniques used in these ads."
• Organise the output into a structured Market Research doc

STEP 7 — ORGANISE FINDINGS
• Document: top 3 personas, top 4 angles, top hesitations, recommended tone, sticky phrases
• Store in the client's shared drive folder
• This document feeds all creative work

CAUTIONARY NOTES
• Avoid confirmation bias — research to understand the customer, not to validate existing beliefs
• Avoid using only examples from large established brands — find comparable-sized competitors
• This research must be completed BEFORE any ads are written or designed`},
{id:"mc5l2",title:"Market Research into Ad Creation",mins:12,video:"ac717542f0654b75a9b9520b77efb297",body:`MARKET RESEARCH AND AD CREATION — COMBINED SOP

OBJECTIVE
Use market research findings to create effective, diverse ad content that targets the right people with the right message.

STEP 1 — UNDERSTAND CUSTOMER AWARENESS LEVELS
Before writing anything, identify where on the awareness scale your audience sits:
• Unaware — educate them about the problem. Don't sell yet.
• Problem Aware — acknowledge their pain. Make them feel seen. UGC and founder stories work best.
• Solution Aware — show why YOUR solution is different. Features vs benefits, us vs them.
• Product Aware — prove it works. Testimonials, case studies, results with numbers.
• Most Aware — they know you. Give them a reason to act NOW. Offers, retargeting, urgency.

STEP 2 — DEFINE YOUR ICPs (Ideal Customer Profiles)
Identify 1-4 specific customer personas:
• What do they do? What do they earn?
• What problem keeps them up at night?
• What have they already tried that didn't work?
• What words do they actually use to describe their problem?
• What would the ideal outcome look like for them?

STEP 3 — GATHER MARKET RESEARCH DATA
Sources to use:
• Meta Ad Library — competitor ads running 3+ months
• Google Reviews and Trustpilot — for the client AND their competitors
• Comments on competitor ads — real customer sentiment in their own words
• Reddit, Facebook Groups — community discussions about the niche

STEP 4 — APPLY CREATIVE DIVERSITY
Meta's algorithm groups similar ads. Avoid this with diversity across four dimensions:
1. Message — different personas, angles, emotions, awareness levels, offers
2. Media Type — static image, video/reel, carousel, collection
3. Creative Framework — benefits, us vs them, before/after, UGC, founder story, case study, PAS, AIDA
4. Style — lo-fi/raw/authentic, hi-fi/polished, AI-generated

STEP 5 — CREATE 3-5 AD VARIATIONS PER ANGLE
For each angle identified in research:
• Create 3-5 variations (different headlines, different visuals, different hooks)
• Ensure both image and video format are covered for each angle
• Use the 4 U's to score every headline: Urgent, Unique, Ultra-Specific, Useful (aim for 3+ out of 4)

AD CREATION GUIDELINES
• Use 7th-grade reading level — accessible language wins
• Focus on benefits, not features
• Write in present tense and address the reader directly ("You")
• Always include social proof and a clear call to action
• Keep headlines to 5-8 words

CAUTIONARY NOTES
• Never start creating ads before market research is complete
• Avoid overly complex language — clarity beats cleverness
• Templates speed up creation — use the VirtueCore template library`}

{id:"mc6",title:"Module 6: Creating Effective Ad Campaigns — Live Build",lessons:[
{id:"mc6l1",title:"Audience Research & Campaign Strategy",mins:13,video:"7996eb00c1a94883953fadd77acfc354",body:`CREATING EFFECTIVE AD CAMPAIGNS — SOP

OBJECTIVE
Build effective Meta ad campaigns by deeply understanding your client's goals and target audience before touching Ads Manager.

STEP 1 — UNDERSTAND THE CLIENT'S GOALS
Before creating anything, clarify:
• What is the campaign objective? (leads, sales, bookings, awareness?)
• What does success look like for this client?
• What is the minimum acceptable cost per result?
• Is there a specific offer, deadline, or promotion to feature?

STEP 2 — IDENTIFY THE IDEAL CUSTOMER
Answer before writing a single word:
Who is the ideal customer? Not a vague group — a specific person:
• What do they do for work?
• What do they earn?
• What keeps them up at night?
• What words do they actually use?
• What have they already tried that failed?

STEP 3 — APPLY THE 5 AWARENESS LEVELS
Use Eugene Schwartz's framework to determine how to write the ad:
• Level 1 — UNAWARE: Educate or entertain. Don't sell yet.
• Level 2 — PROBLEM AWARE: Call out their pain. UGC, founder story, tutorials.
• Level 3 — SOLUTION AWARE: Show why YOU are different. Us vs them, features/benefits.
• Level 4 — PRODUCT AWARE: Prove it works. Testimonials, 3 reasons why.
• Level 5 — MOST AWARE: Give them an offer. Create urgency. Retargeting.

STEP 4 — RUN MARKET RESEARCH
Use the Market Research SOP to identify:
• Top 1-4 ICPs
• Top 1-4 buying angles
• Main hesitations and objections
• Tone and language preferences

STEP 5 — IMPLEMENT CREATIVE DIVERSITY
For each persona × angle combination:
• Write 3-5 ad variations
• Mix image and video format
• Score every headline using the 4 U's framework
• Aim for at least 3 out of 4 U's on each headline

STEP 6 — BUILD IN ADS MANAGER
Pre-launch checklist before hitting Publish:
✓ Market research document complete and approved
✓ Client's Meta Ad Account connected to VirtueCore portfolio
✓ Pixel installed and verified — all key events fire once in Test Events
✓ Pixel Settings configured: Automatic Website Matching ON, Auto-Track Events OFF
✓ Event Match Quality (EMQ) score above 5
✓ Creative assets ready and exported in correct dimensions
✓ Ad copy written for all angle/persona combinations
✓ Facebook Page and Instagram account connected

CAUTIONARY NOTES
• Ensure all ads comply with Meta's advertising policies before publishing
• Review and adjust campaigns regularly based on performance data
• Document all research findings — future campaigns on the same account benefit from this`}

{id:"mc7",title:"Module 7: Creating a Sales-Focused Campaign",lessons:[
{id:"mc7l1",title:"Sales Campaign Setup — Shopify & WordPress Integration",mins:5,video:"a0cc4bba417f403a8fd73e66f2232c4c",body:`CREATING A SALES-FOCUSED CAMPAIGN — SOP

OBJECTIVE
Create a sales-focused Meta Ads campaign for clients using partner platform integrations (Shopify, WordPress).

KEY STEPS

1. CAMPAIGN CREATION
• Start by creating a campaign for sales-focused objectives
• Use platforms like Shopify or WordPress for integration

2. CAMPAIGN TYPE SELECTION
• Choose 'Sales' as the campaign type

3. DATE AND PERSONA INPUT
• Enter the campaign date (e.g., 90-01)
• Define the target persona (e.g., XYZ)

4. CAMPAIGN BUDGET AND AD SET NAMING
• Set the campaign budget unless otherwise specified
• Name the ad set clearly and appropriately

5. CONVERSION LOCATION SETUP
• Select the conversion location: single website or app
• Ensure a pixel is active for tracking

6. CONVERSION EVENT SELECTION
• Choose the conversion event: Purchase or Initiate Checkout
• Match the event to the client's actual goal

7. AD SET LABELING

{id:"mc8l1",title:"ABO vs CBO — Campaign Structures, Labelling & Management",mins:20,video:"f69a4ffb3d2e46bbab3cfe10e121920c",body:`CREATING AND MANAGING CAMPAIGNS (ABO, CBO) — SOP

OBJECTIVE
Create and manage advertising campaigns using ABO and CBO structures, with proper labelling and settings for effective ad performance.

UNDERSTANDING ABO vs CBO
• ABO (Ad Set Budget Optimisation): Manual control — you set individual budgets for each ad set. Best for testing.
• CBO (Campaign Budget Optimisation): Meta controls budget distribution across ad sets. Best for smaller budgets or scaling winners.

CAMPAIGN NAMING FORMATS
• Service-based companies: Leads - DD-MM-YY (e.g., Leads - 11-03-21)
• ABO campaigns: ABO Testing — [Service]
• CBO campaigns: Date - CBO - Brand (e.g., Jan 10, 2026 | CBO | Ad Agency Owners | Angle Test)

AD SET LABELLING FORMAT
Date - Persona - Angle - Settings
Example: Jan 10, 2026 | Ad Agency Owners | Angle 1 - Churn Less Clients | Adv+ Broad | Automatic Placements | No Exclusions

AD LABELLING FORMAT
Persona - Angle - Unique Description
Example: Ad Agency Owners | Angle 1 - Churn Less Clients | Red Shirt Talking Head

BUDGET RULES
• For CBO: set a total daily budget for the entire campaign
• For ABO: set individual budgets per ad set — budget for 1-2 leads/day minimum

THE 6-STEP SETUP PROCESS
Step 1: Create one ABO campaign per service
Step 2: Each test = new ad set. Include 3-5 ads per ad set. Group by angle/persona.
Step 3: Budget for 1-2 leads/day per ad set
Step 4: Optimise for the last funnel step (Book a Call, not just Lead)
Step 5: Schedule for early morning NEXT DAY. Not tonight.
Step 6: Launch ONE ad set at a time. Wait 3-5 days before evaluating.

TESTING RULES
• One variable at a time
• Group similar formats (statics with statics, videos with videos)
• Don't add new ads into existing ad sets
• No tiny budgets

CREATING ADS WITHIN THE CAMPAIGN
• Duplicate existing ads if needed
• Name each ad: Persona - Angle - Unique Description
• Ensure the ad links to the correct URL for the client
• Use a display link if the URL is long
• Write primary text with a clear first line as a heading
• Add 5 variations of primary text, headlines, and descriptions

CAUTIONARY NOTES
• Always double-check budget settings to avoid overspending
• Ensure all links are functional before publishing ads`}

{id:"mc9l1",title:"Full Campaign Creation Walkthrough — Step by Step",mins:20,video:"6b577b05f26d49619b07fba310f53137",body:`CREATING A CAMPAIGN IN AN AD ACCOUNT — SOP

OBJECTIVE
Step-by-step process for creating a campaign in an ad account, ensuring clarity and consistency for all team members.

PART 1 — UNDERSTANDING CAMPAIGN STRUCTURES
Two main budget structures:
• ABO (Ad Set Budget Optimisation): Manual control over budget at the ad set level
• CBO (Campaign Budget Optimisation): Meta controls budget distribution across ad sets — suitable for smaller budgets

PART 2 — SETTING UP THE CAMPAIGN
• Create a new campaign for the specific service or client
• For ABO: each test = a new ad set, include 3-5 ads per ad set, group by angle or persona
• For leads: navigate to Campaigns → click 'Create' → select 'Leads' → continue

PART 3 — NAMING THE CAMPAIGN
• Format: Date/Service (e.g., 11-03-21/Leads) — capitalise all letters for readability

PART 4 — OPTIMISATION GOALS

PART 5 — SCHEDULING
• Schedule the campaign to start early morning (5 AM - 8 AM UK time)
• NEVER schedule during late hours (10 PM - 11 PM) — wastes budget
• Set the start date to TOMORROW — not today

PART 6 — SETTING UP AD SETS
• Name the ad set: Date - Persona - Angle
• Set individual budget per ad set for ABO
• Keep the audience broad unless specific exclusions are required
• Choose the appropriate pixel for tracking conversions

PART 7 — CREATING ADS
• Duplicate existing ads as needed and rename by persona and angle
• Upload images/videos — ensure URL directs to client's website
• Create primary text, headlines, and descriptions — 5 variations each

PART 8 — FINALISING

• Preview the campaign before publishing

DELETING A CAMPAIGN

{id:"mc10",title:"Module 10: Understanding Meta's Algorithm",lessons:[
{id:"mc10l1",title:"How Meta's Algorithm Works & How to Use It",mins:3,video:"f82f13dd1a094652a1f1284210784c49",body:`UNDERSTANDING AND UTILISING META'S ALGORITHM — SOP

OBJECTIVE
Understand how Meta's algorithm works so you can set up and manage ad campaigns that align with how Meta finds and optimises for your ideal customers.

HOW META FINDS YOUR CUSTOMERS
When you publish an ad, Meta uses all of the following to choose an initial audience:
• Pixel data (conversion history)
• Ad account history
• Campaign settings
• Creative copy and landing page
• Initial audience data (e.g., your page/account's follower count)

THE LEARNING PHASE (First 24-48 Hours)
• Meta targets "low-hanging fruit" — warm audiences who are most likely to convert
• This gives you early results while Meta gathers conversion data to learn from
• These early conversions matter enormously — they set the algorithm's direction

WHY FIRST CONVERTERS MATTER
• First converter is ideal → algorithm snowballs in the RIGHT direction ("hitting the vein")
• First converter is a bad fit → algorithm chases more bad fits
• You cannot easily reverse poor initial targeting — fix the creative/copy BEFORE launching

"CREATIVE IS THE NEW TARGETING"
Meta scans your creative, copy, AND landing page to decide who sees your ad. You are writing for two audiences simultaneously: humans AND the algorithm. Your creative targeting IS your ad creative.

ENGAGEMENT MANAGEMENT
Comments on your ads affect performance:
• Respond to ALL comments professionally — use them as pitching opportunities
• Delete/hide hateful or irrelevant comments immediately
• Engagement signals to Meta who to show the ad to next
• Treat comment management with the same importance as conversion metrics

OPTIMISING WHEN CAMPAIGNS GENERATE BAD LEADS
• Rewrite the ad copy and creative to attract better-quality leads
• Adjust the landing page to filter out poor fits
• Scale only when you are consistently getting the right people

TIPS
• Regularly review Meta's weekly reports
• Keep creative content fresh and engaging — algorithm rewards new creative
• Set reminders to respond to comments promptly`}

const allL=c=>c.modules.flatMap(m=>m.lessons);
const cPct=c=>{const ls=allL(c);return ls.length?Math.round(ls.filter(l=>P[l.id]).length/ls.length*100):0};
const cDone=c=>allL(c).every(l=>P[l.id])&&c.modules.every(m=>!m.quiz||P[m.quiz.id]?.passed);
const mDone=m=>m.lessons.every(l=>P[l.id])&&(!m.quiz||P[m.quiz.id]?.passed);
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

async function sendToZapier(data){
  if(!ZAPIER_WEBHOOK)return;
  try{await fetch(ZAPIER_WEBHOOK,{method:"POST",mode:"no-cors",body:JSON.stringify({timestamp:new Date().toLocaleString("en-GB"),name:U.name,email:U.email,course:data.course,quiz:data.quiz,score:data.score+"%",status:data.passed?"PASSED":"FAILED",correct:data.correct+"/"+data.total})})}catch(e){}
}

async function doLogin(){
  const e=document.getElementById("inp-email").value.trim().toLowerCase();
  const pw=document.getElementById("inp-password").value;
  const err=document.getElementById("login-err");
  const btn=document.getElementById("login-btn");
  err.style.display="none";
  if(!e||!pw){err.style.display="block";err.textContent="Please enter your email and password.";return}
  btn.disabled=true;btn.textContent="Signing in…";
  try{
    // Sign in via Supabase Auth
    const authRes=await fetch(SUPA_URL+"/auth/v1/token?grant_type=password",{
      method:"POST",
      headers:{"apikey":SUPA_KEY,"Content-Type":"application/json"},
      body:JSON.stringify({email:e,password:pw})
    });
    const authData=await authRes.json();
    if(authData.error||!authData.access_token){
      err.style.display="block";
      err.textContent=authData.error_description||"Incorrect email or password. Contact sales@virtuecore.co.uk for access.";
      btn.disabled=false;btn.textContent="Enter Academy →";return;
    }
    // Fetch profile (is_admin flag)
    const profRes=await fetch(SUPA_URL+"/rest/v1/profiles?id=eq."+authData.user.id+"&select=full_name,is_admin",{
      headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+authData.access_token}
    });
    const profData=await profRes.json();
    const prof=profData[0]||{};
    const name=prof.full_name||authData.user.user_metadata?.full_name||e.split("@")[0];
    const isAdmin=!!prof.is_admin;
    U={name,email:e,isAdmin,token:authData.access_token,uid:authData.user.id};
    try{const raw=localStorage.getItem("vc_p_"+e);P=raw?JSON.parse(raw):{};}catch(ex){P={}}
    document.getElementById("nav-uname").textContent=name;
    if(isAdmin)document.getElementById("tab-admin").classList.remove("hide");
    document.getElementById("pg-login").style.display="none";
    document.getElementById("pg-app").style.display="block";
    renderDashboard();
    // Fire login notification to n8n (non-blocking)
    if(N8N_LOGIN_WEBHOOK&&N8N_LOGIN_WEBHOOK!=="PASTE_YOUR_N8N_WEBHOOK_URL_HERE"){
      const now=new Date();
      fetch(N8N_LOGIN_WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+SUPA_KEY,"apikey":SUPA_KEY},
        body:JSON.stringify({
          name,email:e,isAdmin,
          loginDate:now.toLocaleDateString("en-GB",{weekday:"long",year:"numeric",month:"long",day:"numeric"}),
          loginTime:now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit",timeZoneName:"short"})
        })
      }).catch(()=>{});
    }
  }catch(ex){
    err.style.display="block";err.textContent="Connection error. Please try again.";
  }
  btn.disabled=false;btn.textContent="Enter Academy →";
}

["inp-email","inp-password"].forEach(id=>document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()}));
