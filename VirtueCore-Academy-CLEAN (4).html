{id:"ob1l1",title:"Who We Are & What We Do",mins:5,body:`VirtueCore is one of Birmingham's fastest-growing business automation agencies. We work with founders and SMEs to remove bottlenecks and build the infrastructure they need to grow.

CORE SERVICES
• VA Placement & Training — placing and training virtual assistants for client businesses
• Meta Ads Management — end-to-end Facebook & Instagram campaign management
• Marketing Funnel Builds — landing pages, email sequences, lead generation
• CRM Automation — building and managing pipelines in GoHighLevel
• Business Infrastructure — SOPs, systems, and operational setup

As a VirtueCore VA, you are the engine that keeps client operations running. Every task you complete — on time, to standard — directly affects a real business owner's results.

VirtueCore was founded by Samuel (Sales & Strategy) and Caleb (Systems & Operations). Everything we build here is designed to scale — which means your work directly contributes to the growth of every client on our books.`},
{id:"ob1l2",title:"Standards, Expectations & Communication",mins:6,body:`NON-NEGOTIABLES AT VIRTUECORE

• Deadlines are firm. If you can't meet one, communicate at least 24 hours before — never after.
• Quality over speed. A task done slowly and correctly beats one done quickly and wrong.
• Proactive communication. Stuck? Ask. Something looks wrong? Flag it. Never sit on a problem.
• Confidentiality. Client data, our processes, and internal systems are strictly confidential.
• Own your mistakes. If you get something wrong, flag it immediately and fix it. We will not tolerate hidden errors.

THE GOLDEN RULE
Treat every client's business like it's your own. You wouldn't accept a sloppy job on your own business — don't deliver one to a client.

COMMUNICATION STANDARDS
• All task communication runs through designated Slack channels
• Default response time: within 4 business hours during working hours
• Always confirm task receipt when assigned ("On it — I'll have this done by [time]")
• Always confirm completion with a summary of what was done`}

{id:"ob2l1",title:"Your Core Toolkit",mins:7,body:`TOOLS YOU WILL USE DAILY

• GoHighLevel (GHL) — Our primary CRM and marketing automation platform. Most client pipelines and automations live here.
• Zapier — Connects apps and automates workflows without code. You'll use this to automate lead flows, notifications, and data entry.
• Meta Business Suite — Managing Facebook and Instagram ad accounts for clients.
• Canva — Creating image ads, lead magnets, and social content.
• Google Workspace (Docs, Sheets, Drive) — All internal documentation, reports, and files.
• CapCut / Submagic — Video editing and caption generation for client content.
• Slack — Internal team communication. Check your assigned channel daily.

SECURITY RULES
• You only have access to what you need for your specific tasks

{id:"psych",icon:"🧠",color:"#8B5CF6",tagBg:"rgba(139,92,246,0.12)",tagCol:"#A78BFA",tag:"FOUNDATION",title:"Marketing Psychology",
desc:"The mindset behind all effective advertising. Understand buyer awareness levels, pain-to-action psychology, and why ads either move people or get scrolled past.",
modules:[
{id:"ps1",title:"The Foundation of Advertising That Works",video:"",lessons:[
{id:"ps1l1",title:"Selling Solutions, Not Products",mins:8,body:`THE MOST IMPORTANT SHIFT IN MARKETING

Most people selling products or services think they're selling a thing. A service. A product. A subscription. They're wrong.

You are always selling a solution to a problem.

This distinction changes everything about how you write ads, how you frame offers, and how you speak to potential customers.

EXAMPLE
• Selling a gym membership — Wrong frame
• Selling confidence, energy, and a body that makes people look twice — Right frame

• Selling a Facebook ad campaign — Wrong frame
• Selling more leads, more calls booked, less stress about where the next client comes from — Right frame

THE CORE PRINCIPLE
People don't buy products. They buy better versions of themselves or their situation. Every ad you write should answer the question: "What does this person's life look like after they buy?"

THREE THINGS THAT MAKE GREAT ADS
1. Speak to a specific person — not a general audience. The more specific you are, the more people feel like you're talking directly to them.
2. Identify their exact pain point — what keeps them up at night, what frustrates them, what they've tried that hasn't worked.
3. Position your product as the solution to that specific pain — with proof that it actually works.`},
{id:"ps1l2",title:"The 5 Levels of Buyer Awareness",mins:10,body:`EUGENE SCHWARTZ'S AWARENESS FRAMEWORK

This is the most important concept in advertising. Where your prospect sits on this scale determines everything: the headline you write, the length of your ad, the angle you take, and the call to action you use.

LEVEL 1 — UNAWARE
They don't know they have a problem. They haven't connected their situation to a solvable issue.
Ad approach: Tell a story. Educate. Don't sell yet. Draw them in with relatable content.
Example headline: "Why most business owners are burning 20 hours a week they'll never get back"

LEVEL 2 — PROBLEM AWARE
They know something is wrong but don't know solutions exist.
Ad approach: Agitate the pain. Name it clearly. Then introduce the concept of a solution.
Example headline: "Struggling to get consistent leads? You're not alone — and there's a reason why"

LEVEL 3 — SOLUTION AWARE
They know solutions exist but don't know your specific product/service.
Ad approach: Show why your approach is different. Differentiate from alternatives.
Example headline: "Why most lead gen agencies fail — and what we do differently"

LEVEL 4 — PRODUCT AWARE
They know you exist but haven't committed. They're comparing you to alternatives.
Ad approach: Social proof, testimonials, risk reversal, guarantees. Remove objections.
Example headline: "Join 127 business owners generating consistent leads with VirtueCore"

LEVEL 5 — MOST AWARE
They're ready to buy. They just need the right offer or a nudge.
Ad approach: Strong offer, urgency, direct CTA. Keep it short and direct.
Example headline: "3 spots left this month — book your free strategy call now"

THE PRACTICAL APPLICATION
Most cold audiences are at Level 1-2. Most retargeting audiences are at Level 3-4. Matching your ad to the wrong awareness level is the #1 reason ads fail despite good creative.`}
],quiz:{id:"ps1q",title:"Awareness Levels Quiz",qs:[
{q:"What are you always really selling, according to the VirtueCore marketing framework?",opts:["Products and services","Solutions to people's problems","The best price in the market","Your company's story"],ans:1},
{q:"A prospect at Level 2 (Problem Aware) knows:",opts:["Exactly which product they want","That solutions exist but doesn't know yours","Something is wrong but hasn't found solutions","Nothing about their problem yet"],ans:2},
{q:"Which awareness level should you target with social proof and testimonials?",opts:["Level 1 — Unaware","Level 2 — Problem Aware","Level 4 — Product Aware","Level 5 — Most Aware"],ans:2},
{q:"Most cold audiences are at which awareness level?",opts:["Level 4-5","Level 3-4","Level 1-2","Level 5 only"],ans:2},
{q:"What is the #1 reason ads fail despite good creative?",opts:["Wrong platform","Too much text","Mismatched awareness level in the ad","Poor video quality"],ans:2}
]}},
{id:"ps2",title:"Writing Ads That Actually Convert",lessons:[
{id:"ps2l1",title:"The 7 Rules for All Ad Copy",mins:8,body:`BEFORE YOU WRITE A SINGLE WORD

Every piece of ad copy — whether it's a headline, a video script, or a landing page — should be tested against these 7 rules.

RULE 1 — WRITE SIMPLY
7th grade reading level. Short sentences. Short paragraphs. If a 14-year-old couldn't understand it quickly, rewrite it.

RULE 2 — LEAD WITH BENEFITS, NOT FEATURES
Feature: "Our CRM has automated follow-up sequences"
Benefit: "Never lose a lead because you forgot to follow up — it happens automatically"

RULE 3 — WRITE TO ONE PERSON
Use "you" constantly. Imagine one specific person reading this. Write to them. Not to a crowd.

RULE 4 — FLOOD WITH PROOF
Testimonials. Before/afters. Specific numbers. Case studies. Screenshots. The more sceptical your audience, the more proof you need.

RULE 5 — BE SPECIFIC
"We helped 23 wedding photographers in Birmingham book 4 extra clients per month" beats "We help photographers get more clients" every time.

RULE 6 — TELL THE FULL STORY
Long copy usually outperforms short copy. Cover all the selling points. Address every objection. Then close.

RULE 7 — ONE CLEAR CTA
What should they do next? Click the link? Book a call? DM you? Tell them exactly what to do, what happens when they do it, and what they get.`},
{id:"ps2l2",title:"AIDA & PAS — The Two Frameworks",mins:7,body:`TWO PROVEN FRAMEWORKS FOR AD STRUCTURE

FRAMEWORK 1 — AIDA (Lead with Aspiration)
Use when your audience responds more to desire and aspiration than pain.

A — ATTENTION: Your headline. Stop the right person scrolling.
"How Sarah generated 47 qualified leads in 30 days without a single cold call"

I — INTEREST: Give them a reason to keep reading. Facts, a curiosity gap, or a relatable story.
"She was running ads for 6 months with no results. Then she made one change..."

D — DESIRE: Paint the dream outcome. What does life look like after?
"Now she has a predictable pipeline, books 8 calls a week, and finally has time to work on the business instead of in it."

A — ACTION: Tell them exactly what to do next.
"Click below to book a free 20-minute strategy call. We'll show you the exact same system."

FRAMEWORK 2 — PAS (Lead with Pain)
Use when your audience is more motivated by avoiding pain than gaining pleasure.

P — PROBLEM: Name the specific pain directly.
"Most service business owners are running ads that attract the wrong clients."

A — AGITATE: Twist the knife. Make them feel the cost of the problem.
"Low-quality leads, wasted sales calls, money spent on ads with no return — it compounds every week you let it continue."

S — SOLUTION: Present your product or service as the answer, with proof.
"VirtueCore's lead qualification system filters out time-wasters before they reach your calendar. Book a call to see how it works."

WHEN TO USE WHICH
PAS works well for cold audiences at Level 2-3 who are frustrated and actively looking for a solution.
AIDA works well for warmer audiences who need to be inspired into action.`}
],quiz:{id:"ps2q",title:"Copywriting Frameworks Quiz",qs:[
{q:"In the AIDA framework, what does the 'I' stand for?",opts:["Identity","Interest","Impact","Intent"],ans:1},
{q:"PAS framework is most effective for which audience?",opts:["People who have never heard of the problem","Warm audiences ready to buy","Cold audiences who are frustrated and looking for solutions","Existing customers"],ans:2},
{q:"Which of these is a benefit (not a feature)?",opts:["Our software has 47 integrations","Stop losing leads — every enquiry gets followed up automatically","We use advanced AI algorithms","Our platform was founded in 2019"],ans:1},
{q:"According to the 7 rules, what reading level should your ad copy target?",opts:["University level","7th grade","Professional/business level","It depends on the audience"],ans:1}
]}}
]},

{id:"meta",icon:"📣",color:"#E8A020",tagBg:"rgba(232,160,32,0.12)",tagCol:"#E8A020",tag:"META ADS",title:"Meta Ads Mastery",
desc:"The complete VirtueCore Meta Ads playbook. Pixel setup, audience research, campaign structure, creative briefing, optimisation and scaling — 8 phases end to end.",
modules:[
{id:"ma1",title:"Phase 1 & 2 — Tracking & Research",lessons:[
{id:"ma1l1",title:"The Meta Pixel & Conversions API",mins:10,body:`WHY TRACKING COMES BEFORE EVERYTHING ELSE

Nothing else in Meta Ads matters if Meta can't track what happens on your website. The Meta Pixel is a piece of code that tells Meta when someone takes an action — views a page, fills out a form, books a call, makes a purchase.

Without it, Meta is flying blind and cannot optimise to find more buyers.

WHAT THE PIXEL DOES
When someone clicks your ad and visits your website, the pixel fires "events" back to Meta:
• Page View — they landed on your site
• Lead — they filled out a form
• Schedule — they booked a call
• Purchase — they bought something

Meta collects this data and uses it to find MORE people like the ones who converted. That's why setting it up correctly from day one is non-negotiable.

THE CONVERSIONS API (CAPI)
Since iOS 14.5, Apple lets users opt out of browser tracking — so the pixel misses some people.
The Conversions API is a server-to-server backup that catches what the pixel misses.
You want BOTH running simultaneously. Meta de-duplicates them automatically.

HOW TO CHECK YOUR PIXEL IS WORKING
1. Go to Events Manager in Meta Business Suite
2. Click your Dataset (pixel) → Test Events
3. Enter the website URL and click Test Events
4. Navigate the site like a customer — fill in the form, book a call
5. Confirm each action fires the correct event exactly once

KEY PIXEL SETTINGS
• Automatic Website Matching: ON — passes maximum data to Meta
• Track events automatically without code: OFF — causes double-firing on Shopify/GHL/WordPress
• Event Match Quality (EMQ): check this score for Lead and Purchase events. Higher is better. Max is 9.3. Low EMQ = not enough data being passed.`},
{id:"ma1l2",title:"Research — Understanding Who You're Talking To",mins:10,body:`THE VIRTUECORE RESEARCH FRAMEWORK

Before you write a single word of ad copy, you need to answer two questions:

QUESTION 1: WHO IS THE IDEAL CUSTOMER?
Not a vague group. A specific person. What do they do? What do they earn? What keeps them up at night? What words do they actually use? What have they tried before that didn't work?

QUESTION 2: HOW AWARE ARE THEY?
Where the prospect sits on the awareness scale determines how you write the ad (covered in the Marketing Psychology course).

THE 8-PHASE VIRTUECORE PROCESS
Our system for scaling client ad accounts: Setup → Research → Prioritise → Create → Brief → Test → Learn → Scale → Repeat

WHAT YOUR RESEARCH SHOULD ANSWER
• Who are the top 1-4 ideal customer personas?
• What are the top 1-4 angles — the main reasons people buy?
• What are the main hesitations — what almost stops them buying?
• What tone, language, and copy length should you use?
• What visuals/imagery do they relate to?

WHERE TO FIND THIS INFORMATION
• Competitor Ads — Meta Ad Library. Find ads running 3+ months (probably profitable). Study their angles, headlines, copy length.
• Competitor Reviews — Google, TrustPilot, Reddit, Amazon. 3-star reviews have the most nuance.
• Your own client reviews — same analysis
• Related communities — Reddit, Facebook Groups, relevant forums
• Day in the Life — search the internet as if you were the customer. See what you find.

CREATIVE DIVERSITY — 4 WAYS TO BE DIFFERENT
Meta's algorithm groups similar ads and makes them compete against each other.
1. Message — different personas, angles, awareness levels, offers
2. Media Type — static image, video/reel, carousel, collection, dynamic catalog
3. Creative Framework — benefits, us vs them, before/after, UGC, founder story, PAS
4. Style — lo-fi/raw, hi-fi/polished, AI-generated`}
],quiz:{id:"ma1q",title:"Tracking & Research Quiz",qs:[

{id:"ma2",title:"Phase 3 & 4 — Writing Ads",lessons:[
{id:"ma2l1",title:"Where Your Text Goes in a Meta Ad",mins:6,body:`THREE TEXT FIELDS — THREE JOBS

PRIMARY TEXT
The longer body copy. Appears above the creative on Facebook, below on Instagram.
This is where you put: your opening headline (first sentence), benefits, selling points, risk reversal, guarantee, and CTA.
Don't truncate yourself — long copy usually wins. Cover every objection.

HEADLINE FIELD
Short text below the ad image/video on Facebook and Instagram.
Keep it to 5-8 words maximum — it gets cut off if longer.
Use this for punchy, direct statements: "Book Your Free Call Today" or "No Contracts. Cancel Anytime."

DESCRIPTION FIELD
Below the headline on Facebook only (often hidden on Instagram).
Use for short trust tags: "100% Money Back Guarantee" · "Free 20-Minute Strategy Call" · "Trusted by 300+ UK Businesses"

THE 5 HEADLINE SPOTS YOU MUST OPTIMISE
1. First sentence of your primary text (the hook)
2. The headline field below the ad
3. Text on a static image
4. The verbal hook in video (first 3-5 seconds spoken)
5. The caption hook in video (text on screen, first 3-5 seconds)

THE 4 U'S — HOW TO SCORE YOUR HEADLINES
Score 1-4 on each. Aim for 3+ on at least three:
• Urgent — Is there a reason to act now?
• Unique — Does it say something fresh?
• Ultra-Specific — Does it use real numbers and concrete details?
• Useful — Is there a clear benefit?`},
{id:"ma2l2",title:"Video Hooks & Ad Types",mins:8,body:`VIDEO HOOKS — THE FIRST 3-5 SECONDS

The hook is the most important part of any video ad. If you lose them in the first 5 seconds, the rest doesn't matter.

THREE PARTS OF A STRONG VIDEO HOOK
1. Visual Hook — what they SEE. Must be unexpected, interesting, or immediately relevant.
2. Caption Hook — text ON SCREEN. Works when sound is off (most viewers watch silent).
3. Verbal Hook — first words SPOKEN. Should match or complement the caption.

Always brief for 3-5 different hooks per video. Same body content, different openings. This gives you testing material without recreating the whole video.

KEY AD CREATIVE FRAMEWORKS
• UGC (User Generated Content) — authentic, phone-shot content from a real person. Highest trust, lowest production cost.
• Testimonial — real customer sharing their result. Proof-first approach.
• Before/After — shows the transformation. Highly effective for pain-aware audiences.
• Educational/Listicle — "3 reasons why [problem]" or "5 things you need to know about [topic]"
• Founder Story — personal, builds trust and brand connection
• Us vs Them — direct comparison without naming competitors

FOR STATIC IMAGE ADS
Each image brief should include:
• Headline (big and bold, ~11 words)
• Subheadline (supporting text)
• Trust tags ("Rated 4.9/5", "Money Back Guarantee")
• Imagery direction (what visuals this specific ad should show)
• CTA button text ("Book Free Call", "Get Instant Access")

Always create in both 1:1 and 9:16 formats. Stay within Meta's safe zones. Headlines must be readable at mobile size.`}
],quiz:{id:"ma2q",title:"Ad Copy & Creative Quiz",qs:[
{q:"What is the Primary Text field in a Meta ad?",opts:["The image on the ad","The short text below the creative","The longer body copy above the creative on Facebook","The headline field"],ans:2},
{q:"How long should the Headline field be?",opts:["As long as needed","5-8 words maximum","At least 15 words","The same as primary text"],ans:1},
{q:"What are the three parts of a strong video hook?",opts:["Script, voiceover, and music","Visual hook, caption hook, and verbal hook","Intro, middle, and outro","Logo, headline, and CTA"],ans:1},
{q:"Why should you brief for 3-5 different hooks per video?",opts:["To fill time in the brief","To have testing material without recreating the whole video","Because Meta requires multiple hooks","To increase video length"],ans:1},
{q:"The 4 U's framework is used to score what?",opts:["Campaign performance","Your headline quality","Budget allocation","Audience targeting"],ans:1}
]}},
{id:"ma3",title:"Phase 6 & 7 — Campaign Structure & Testing",lessons:[
{id:"ma3l1",title:"ABO vs CBO — Campaign Structures",mins:9,body:`HOW META CAMPAIGNS ARE STRUCTURED

Every Meta campaign has three levels:
• Campaign — where you set the objective
• Ad Set — where you set audience, budget, schedule, placement
• Ad — the actual creative: image/video + copy

ABO vs CBO — THE KEY DECISION

ABO (Ad Budget Optimisation) — you set the budget at Ad Set level
Each ad set gets its own budget. You control exactly how much each test spends.
Best for: most advertisers, especially when testing

CBO (Campaign Budget Optimisation) — Meta controls budget distribution across ad sets
Meta decides which ad sets get more spend. Reduces manual management.
Best for: larger budgets where Meta has enough data to optimise well

THE VIRTUECORE RECOMMENDED STRUCTURE
Setup 1 (Recommended): One ABO campaign per service, acting as a folder.
Each new test = a new ad set. Up to 3-5 ads per ad set, grouped by angle/persona.
You can add unlimited ad sets without affecting existing ones.

SETTING UP CORRECTLY
Step 1: Create one ABO campaign per service
Step 2: Each test = new ad set with 3-5 ads grouped by angle or persona
Step 3: Budget for 1-2 leads per day per ad set
Step 4: Optimise for the LAST funnel step (Book a Call, not just Lead)
Step 5: Schedule for early morning NEXT DAY — never tonight
Step 6: Launch ONE ad set at a time. Wait 3-5 days before touching it.

CAMPAIGN LABELLING
Campaign: ABO Testing — [Service Name]
Ad Set: [Date] | [Persona] | [Angle] | [Settings] | [Audience Type]
Ad: [Persona] | [Angle] | [Unique description of the creative]

Example:
Campaign: ABO Testing — Lead Gen
Ad Set: 14/03/26 | Agency Owners | Angle 1 — Churn Less Clients | Adv+ Broad | Auto Placements
Ad: Agency Owners | Angle 1 | Red Shirt Talking Head`},
{id:"ma3l2",title:"The Testing Rules",mins:7,body:`TESTING IS THE CORE SKILL OF META ADS

Every result you get is data. Good data or bad data — both tell you something. The goal of the testing phase is to find what works, then scale it.

THE NON-NEGOTIABLE TESTING RULES
• One variable at a time — otherwise you can't know what caused the result
• Group similar formats — statics with statics, videos with videos
• Never add new ads into an existing active ad set
• No tiny budgets — underspending starves the algorithm
• Test when the account is performing well — hold when it's performing badly
• Minimum 3-5 days before making any changes

TESTING PRIORITY ORDER
Test in this sequence. Don't skip ahead:
1. PERSONAS — which type of person responds?
2. ANGLES — which message resonates most?
3. OFFERS — which gets them to actually click and enquire?
4. CREATIVES — which format performs best?
5. COPY — which style and length wins?

THE SNOW GLOBE RULE
Every change you make causes volatility. Let the algorithm settle after any change before judging the result. Think of it like a snow globe — shake it, then wait for the snow to settle before deciding if you like the view.

THE LEARNING PHASE
Every new ad set enters Meta's learning phase. Meta is figuring out who to show your ad to. Aim for 50 optimisation events per week to exit it. Avoid making changes during this phase — changes reset learning.

Don't stress about the learning phase. Focus on results, not the label.`}
],quiz:{id:"ma3q",title:"Campaign Structure & Testing Quiz",qs:[
{q:"In ABO campaigns, where is the budget set?",opts:["Campaign level","Ad set level","Ad level","Account level"],ans:1},
{q:"What is the recommended first thing to test in a new account?",opts:["Ad copy styles","Creative formats","Personas — which type of person responds","Campaign objectives"],ans:2},
{q:"Why should you never add new ads to an existing active ad set?",opts:["It is against Meta's terms","It disrupts the existing data and resets learning","It doubles the budget automatically","Meta will suspend the account"],ans:1},
{q:"What does the 'Snow Globe Rule' mean?",opts:["Use cold audiences first","After making a change, wait for results to stabilise before judging","Change budgets frequently","Launch new campaigns in winter"],ans:1},
{q:"How many days minimum should you wait after making a change?",opts:["1 day","24 hours","3-5 days","1-2 weeks"],ans:2}
]}},
{id:"ma4",title:"Phase 8 — Optimisation & Scaling",lessons:[
{id:"ma4l1",title:"Reading Your Data",mins:8,body:`WHICH NUMBERS ACTUALLY MATTER

PRIMARY METRICS (Lead Generation)
• Cost Per Lead (CPL) — your main scorecard. Lower is better, but quality matters too.
• Lead Quality — are these people actually good leads? Talk to the client.

SECONDARY METRICS (Diagnostics)
• CTR (Click-Through Rate) — % of people who clicked after seeing the ad. Low CTR = weak hook or wrong audience.
• CPC (Cost Per Click) — how much each click costs. High CPC + low CTR = creative problem.
• Hook Rate — 3-second video plays ÷ impressions. Low = your first 3 seconds are losing people.
• Hold Rate — ThruPlays ÷ 3-second plays. Low = they started watching but left. Your middle content is losing them.
• CPM — cost per 1,000 impressions. This is what Meta charges you. High CPM = competitive auction or poor relevance.
• Frequency — average times each person saw your ad. High frequency + bad results = ad fatigue. Refresh creative.

THE DIAGNOSTIC FLOW
Step 1: Check 7-day average (not single days — averages smooth out volatility)
Step 2: Walk through each day's spend distribution
Step 3: Find ads eating budget with poor results
Step 4: Use "Filter By Selection" — tick your keepers, filter, compare CPL across them
Step 5: After any changes, wait 3-5 days before judging again

THE GOLDEN RULE: If it's working, leave it alone.
9 out of 10 times, touching a working campaign makes it worse.`},
{id:"ma4l2",title:"Scaling — Vertical & Horizontal",mins:9,body:`YOU FOUND SOMETHING THAT WORKS. NOW SCALE IT.

WHEN TO SCALE
Only scale when ALL of these are true:
• 7-day average CPL is consistently below your target
• Consistent lead volume day after day (not just 1-2 good days)
• Overall account performance is positive

VERTICAL SCALING (increase budgets)
Increase the budget on winning ad sets.
How much: start with 25-50% increases. Wait 3-5 days. If still working, increase again.
Think in terms of leads per day, not percentages.

THE POINT OF COLLAPSE
Every campaign has a budget level where results crash. You can't know where it is in advance. Scale gradually and always observe for 3-5 days after each increase.

HORIZONTAL SCALING (launch new campaigns)
Leave winners alone. Launch NEW ad sets or campaigns with additional budget.
Always use new assets — new creative, different offer, different landing page. This prevents you competing against yourself in the auction.
Winner campaigns: take PostIDs from winning ads and put them in new campaigns with different targeting. NEVER close the original profitable campaign.

COMMON SCALING MISTAKES
✗ Scaling after only 1-2 good days
✗ Scaling when results are mediocre (only scale when results are clearly good)
✗ 3x-5x budget overnight
✗ Scaling every single day (let the snow globe settle)
✗ NOT scaling when results are amazing — this is a missed opportunity

THE 23 META ADS RULES (Key Ones)
• Optimise for the right thing. Leads = last funnel step. Sales = Purchase event.
• Schedule launches for early morning next day. Never launch at 6pm.
• Never turn off a profitable campaign — not even to "graduate" to a new one.
• Focus on 7-day averages, not single days.
• Ignore Meta's recommendations — they want you to spend more.
• Always be making new creatives. Have a folder ready before you need them.`}
],quiz:{id:"ma4q",title:"Optimisation & Scaling Quiz",qs:[
{q:"What is the primary scorecard metric for lead generation campaigns?",opts:["CPM","Hook Rate","Cost Per Lead (CPL)","Frequency"],ans:2},
{q:"What does a low Hook Rate indicate?",opts:["The offer is weak","The first 3 seconds of your video are losing viewers","The audience is too broad","The budget is too low"],ans:1},
{q:"What does Horizontal Scaling mean?",opts:["Increasing budget on existing campaigns","Launching new campaigns with new assets alongside winners","Reducing budget to save money","Testing new audiences"],ans:1},
{q:"When is the correct time to scale?",opts:["After 1-2 good days","When the account just launched","When 7-day average CPL is consistently below target with stable volume","Whenever the client asks you to"],ans:2},
{q:"What is the Golden Rule of Meta Ads?",opts:["Always be testing","If it's working, leave it alone","Scale as fast as possible","Launch new campaigns every week"],ans:1}
]}},

{id:"ma5",title:"Module 5: Client Onboarding & Account Access",lessons:[
{id:"ma5l1",title:"Attaching a Client's Meta ID to Your Portfolio",mins:6,video:"8d9833c4b2654f6f85991a89eccb4e84",body:`ATTACHING A CLIENT'S META ID — SOP

OBJECTIVE
Attach a client's Meta Ad Account to VirtueCore's Business Portfolio so you have full access to manage their campaigns.

STEP 1 — ACCESS THE CLIENT MANAGEMENT SHEET
• Locate the client's management sheet in the shared drive
• Navigate to the 'Client' section to find their Meta Ad Account ID
• If the ID is not there, log into Typeform using the provided credentials and go to: Content → Forms → Passwords Form

STEP 2 — COPY THE META AD ACCOUNT ID
• Find the client's Meta Ad ID in the management sheet
• Copy the full numeric ID — it will look like a 15-digit number

STEP 3 — OPEN META ADS MANAGER → BUSINESS SETTINGS
• Go to Ads Manager and select the VirtueCore portfolio (top-left dropdown)
• Navigate to Business Settings (gear icon in the left sidebar)

STEP 4 — ADD THE AD ACCOUNT
• In Business Settings, go to Accounts → Ad Accounts
• Click + Add → Request Access to an Ad Account in Another Business Portfolio
• Paste the copied Meta Ad ID → click Next
• Request Full Control → click Done

STEP 5 — NOTIFY THE CLIENT TO APPROVE
• Inform the client to check their Meta Business Suite notifications or email
• They must click Approve on the access request before you can manage the account

STEP 6 — REQUEST ACCESS TO PAGES & INSTAGRAM
Once the ad account is accepted:
• Go to Accounts → Pages → Add → Request Shared Access to a Facebook Page
• Enter the client's Facebook page URL → request all access → Done
• Go to Accounts → Instagram Accounts → Add → Claim Instagram Account
• Follow the same process

STEP 7 — TROUBLESHOOT ACCESS ISSUES
If the client can't see the request, guide them to:
• Go to their Facebook Page or Instagram → Settings → Assign Partner / Assign People → select VirtueCore and grant Full Control

STEP 8 — THIRD-PARTY PLATFORMS
If the client uses Shopify, WordPress, WooCommerce or Wix:
• Log into their website backend using credentials from the management sheet
• Confirm you have access before setting up pixel integrations

CAUTIONARY NOTES
• Always double-check all IDs and URLs before submission — one wrong digit causes the request to fail
• Handle all client credentials confidentially — never store passwords outside the approved systems
• Never create ad accounts on behalf of clients — always access the one they already own`},
{id:"ma5l2",title:"Setting Up & Testing the Meta Pixel",mins:25,video:"15d64a266ce746cc823c16ac8c5ee719",body:`SETTING UP AND TESTING META PIXEL — SOP

OBJECTIVE
Set up the Meta Pixel on a client's website and verify it is correctly tracking all key events before any ads go live.

PART 1 — INSTALL THE PIXEL HELPER EXTENSION
• Open Chrome → navigate to the Chrome Web Store
• Search for 'Meta Pixel Helper' → Add to Chrome → Pin the extension
• This extension lets you see which pixels are firing on any webpage

PART 2 — CHECK IF THE CLIENT ALREADY HAS A PIXEL
• Visit the client's website
• Click the Pixel Helper extension icon in your browser toolbar
• If it shows a pixel with events firing → the pixel is already installed
• If it shows 'No Pixels Found on this page' → you need to install one

PART 3 — TEST AN EXISTING PIXEL VIA ADS MANAGER
• Go to Meta Ads Manager → Events Manager (left sidebar)
• Select the client's Dataset (pixel)
• Click 'Test Events' tab
• Enter the client's website URL → click Open Website
• Navigate the site as a customer (fill out a form, visit the thank-you page)
• Confirm each action shows up in the Test Events panel exactly once
• If events fire twice → double-firing issue (see Pixel Settings SOP)

PART 4 — CREATE A NEW PIXEL (if none exists)
• Go to Events Manager → click 'Connect Data' → Web → Get Started
• Choose partner integration method:
  — WordPress: install the Meta Pixel plugin
  — Shopify: connect via the Meta sales channel in Shopify Settings
  — GHL (GoHighLevel): paste the pixel ID into GHL Settings → Integrations → Facebook Pixel
  — Other: use Google Tag Manager (recommended by Meta — 15% lower cost per result)
• Name the pixel: [ClientName] Pixel → click Create
• Follow the connection prompts for the chosen platform

PART 5 — VERIFY INSTALLATION
• Return to Events Manager → Test Events
• Repeat the customer journey on the client's website
• Confirm all key events fire correctly: PageView, Lead, Schedule, Purchase
• Check Event Match Quality (EMQ) score — aim for 5+ out of 9.3

CAUTIONARY NOTES
• Always confirm the pixel is firing correctly BEFORE launching any ads
• If the client is on Shopify, GHL, or WordPress, do NOT use manual code installation AND automatic matching — this causes double-firing
• Use the correct website URL when testing — staging sites may not match the live pixel`}

{id:"ma6",title:"Module 6: Pixel Settings & Data Quality",lessons:[
{id:"ma6l1",title:"Pixel Settings Deep Dive",mins:10,video:"6c2a6308cf6440a5a2427c6409e19e9a",body:`PIXEL SETTINGS STANDARD OPERATING PROCEDURE

OBJECTIVE
Configure pixel settings correctly to maximise data quality and prevent tracking errors on every new client account.

THE THREE KEY SETTINGS TO CHECK

1. AUTOMATIC WEBSITE MATCHING — TURN ON
• In Events Manager → select your Dataset → Settings tab
• Find 'Automatic Website Matching' and ensure it is ON
• Expand 'Show customer information parameters' and turn ALL toggles ON
• This passes maximum customer data to Meta (hashed for privacy) and dramatically improves Event Match Quality (EMQ)

2. TRACK EVENTS AUTOMATICALLY WITHOUT CODE — TURN OFF
• This setting is ON by default and causes double-firing on Shopify, GHL, and WordPress
• Find it in Settings and switch it OFF
• COMMON MISTAKE: If events are firing twice, this is almost always the cause

3. EVENT MATCH QUALITY (EMQ) SCORE
• Check this score for your key events: Lead, Purchase, Schedule
• Maximum score is 9.3 — higher is always better
• Score below 5 = insufficient data reaching Meta. Investigate immediately.
• Score above 7 = excellent. Keep it here.
• Low EMQ is caused by: cookie blocking, privacy updates, not collecting enough user data (name, email, phone) from forms

HOW TO IMPROVE A LOW EMQ SCORE
• Ensure your Typeform/intake form collects: first name, last name, email, phone number
• These fields should be sent directly to Meta via Zapier or native integration
• Consider implementing a Conversions API (CAPI) gateway if EMQ stays low

CHECKING THE CONVERSIONS API STATUS
• In Events Manager → Settings → scroll to 'Conversions API' section
• It should show Active with a recent 'Last received' timestamp
• If using a GHL/Shopify/WordPress plugin, the CAPI is usually included automatically
• If building a custom integration, CAPI requires server-side implementation

SHARING THE PIXEL WITH YOUR AD ACCOUNT
• TIP: If a pixel doesn't appear in your ad account, you may need to share it
• Go to Events Manager → your Dataset → Settings → scroll to 'Sharing'
• Click 'Share with an Ad Account' and add your VirtueCore ad account ID

MONITORING REGULARLY
• Check pixel settings whenever a new client is onboarded
• Review EMQ scores monthly — they can drop if a client changes their website platform
• Keep an eye on the event history graph — sudden drops in events = pixel issue`},
{id:"ma6l2",title:"Live Meta Ads Campaign Build",mins:22,video:"9957faeb09f64530837438d1a057dc4c",body:`CREATING AND MANAGING META ADS — FULL WALKTHROUGH SOP

OBJECTIVE
Create a complete Meta Ads campaign from scratch — from business portfolio setup through to publishing the first ad.

PART 1 — META ADS STRUCTURE (REVIEW)
Three levels, always remember them:
• Campaign → the objective (what Meta optimises for)
• Ad Set → the audience, budget, schedule, placements
• Ad → the actual creative: image/video + copy

PART 2 — SET UP YOUR META BUSINESS PORTFOLIO
If starting fresh for yourself (not a client):
• Go to business.facebook.com → Create Account
• Enter your business name, your name, and your business email
• Connect your Facebook Page and Instagram account (Settings → Accounts → Pages / Instagram)
• Create your Ad Account (Settings → Accounts → Ad Accounts → Add → Create New)
  Set ad account name, time zone, currency → assign to your business → add payment

PART 3 — CHOOSING YOUR CAMPAIGN OBJECTIVE
Go to Ads Manager → Create → choose objective:
• Awareness — brand visibility, not conversion-focused
• Traffic — driving website visits (not recommended for lead gen)
• Engagement — post interactions, video views
• Leads — collecting contact information via forms or website events
• Sales — optimising for purchase events

For most VirtueCore clients: use Leads or Sales

PART 4 — AD SET SETUP
Name format: [Date] | [Persona] | [Angle] | [Settings] | [Audience Type]
• Location: target the client's specific geography
• Age & Gender: based on ICP from market research
• Detailed Targeting: use demographics, interests, or behaviours — or leave broad and let Meta's algorithm find the right people
• Budget: set at ad set level (ABO) — budget for 1-2 leads per day minimum
• Schedule: set start date to TOMORROW MORNING — never launch tonight
• Placements: use Advantage+ Placements (automatic optimisation)

PART 5 — CREATING THE AD
• Select your Facebook Page and Instagram account
• Choose format: Single Image, Video, Carousel
• Upload your creative asset
• Write Primary Text (your main copy)
• Write Headline (5-8 words, punchy)
• Write Description (short trust tags)
• Select Call to Action button (e.g., 'Learn More', 'Book Now', 'Sign Up')
• Check the ad preview on all placements before publishing
• Hit Publish

PART 6 — TRACKING PERFORMANCE
Key metrics to monitor (Ads Manager → Ads Reporting):
• Cost Per Result (CPR/CPL) — primary scorecard
• Frequency — how many times each person has seen your ad
• Reach & Impressions — overall exposure
• CTR (Click Through Rate) — quality of the creative/audience match
• Hook Rate — 3-second video plays ÷ impressions (video ads)

CAUTIONARY NOTES
• Ensure compliance with Meta advertising policies — never run ads in restricted categories without disclosures
• Avoid over-targeting (narrow audiences) — broad audiences often outperform tight interest targeting
• Always start with a small test budget before scaling`}

{id:"ma7",title:"Module 7: Market Research for Meta Ads",lessons:[
{id:"ma7l1",title:"Market Research SOP — Using the Meta Ad Library",mins:27,video:"365a5557b2994779a9707b0fcb85b163",body:`MARKET RESEARCH SOP FOR META ADS

OBJECTIVE
Conduct structured market research for every new client before creating any ads. Research informs everything: who you target, what you say, and how you say it.

THE GOAL OF MARKET RESEARCH
Before moving to ad creation, you must be able to answer:
• Who are the top 1-4 ideal customer personas (ICPs)?
• What are the top 1-4 angles — the main reasons people buy?
• What are the top hesitations — what almost stops them buying?
• What awareness/sophistication level is the audience at?
• What tone, language, and copy length should you use?
• What visuals/imagery will they relate to?
• What emotional triggers will get them to act?

STEP 1 — ACCESS THE META ADS PLAYBOOK
• Locate the Meta Ads Playbook in your Google Drive
• Familiarise yourself with the research checklist before starting

STEP 2 — IDENTIFY THE TARGET AUDIENCE
• Review the client's onboarding Typeform for ICP details
• If the client has not defined a target audience, you will research one
• Goal: identify "hot leads" — people most likely to convert, not just people who might be interested

STEP 3 — ANALYSE EXISTING COMPETITOR ADS IN THE META AD LIBRARY
• Go to Meta Ad Library: facebook.com/ads/library
• Search for competitors similar to the client's business
• Filter by: country, platform (Facebook/Instagram), media type (Images or Video)
• Focus on ads that have been running 3+ months — longevity usually means profitability
• Note: angles, headlines, offers, copy length, visual style, CTA

STEP 4 — INSPECT ADS FOR DEEPER DATA
• Right-click on a competitor ad → Inspect → Network tab
• Click the video to play it → right-click the video file in the Network list → Open in new tab
• Right-click → Save video as (for analysis)
• Study: what angles are being used? What makes this ad run for months?

STEP 5 — RESEARCH COMPETITOR REVIEWS
• Search the competitor on Google, Trustpilot, Reddit
• Read 3-star reviews — they give the most nuanced insight (both praise and pain points)
• Note exact language customers use — these become your ad headlines and copy

STEP 6 — COMPILE INTO A CLAUDE DOCUMENT
• Open Claude.ai
• Paste in: competitor ad details, customer reviews, client background info
• Ask Claude: "Act as a Senior Creative Strategist. Give me a full breakdown of angles, pain points, hooks, emotions, and techniques used in these ads."
• Review and organise the output into a structured Market Research doc

STEP 7 — ORGANISE FINDINGS
• Document: top 3 personas, top 4 angles, top hesitations, recommended tone, sticky phrases
• Store in the client's shared drive folder
• This document is the brief that feeds all creative work

CAUTIONARY NOTES
• Avoid confirmation bias — research to understand the customer, not to validate what you already believe
• Avoid using only examples from large established brands — find comparable-sized competitors
• This research must be completed BEFORE any ads are written or designed`},
{id:"ma7l2",title:"Market Research & Ad Creation Workflow",mins:12,video:"ac717542f0654b75a9b9520b77efb297",body:`MARKET RESEARCH AND AD CREATION — COMBINED SOP

OBJECTIVE
Use market research findings to create effective, diverse ad content that targets the right people with the right message.

STEP 1 — UNDERSTAND CUSTOMER AWARENESS LEVELS
Before writing a single word, identify where on the awareness scale your audience sits:
• Unaware — educate them about the problem. Don't sell yet.
• Problem Aware — acknowledge their pain. Make them feel seen. UGC and founder stories work best.
• Solution Aware — show why YOUR solution is different. Features vs benefits, us vs them.
• Product Aware — prove it works. Testimonials, case studies, results with numbers.
• Most Aware — they know you. Give them a reason to act NOW. Offers, retargeting, urgency.

STEP 2 — DEFINE YOUR ICPs (Ideal Customer Profiles)
Identify 1-4 specific customer personas:
• What do they do? What do they earn?
• What problem keeps them up at night?
• What have they already tried that didn't work?
• What words do they actually use to describe their problem?
• What would the ideal outcome look like for them?

STEP 3 — GATHER MARKET RESEARCH DATA
Sources to use:
• Meta Ad Library — competitor ads running 3+ months (profitable ads)
• Google Reviews and Trustpilot — for the client AND their competitors
• Comments on competitor ads — real customer sentiment in their own words
• Reddit, Facebook Groups — community discussions about the niche

STEP 4 — IDENTIFY WHAT YOU'RE TRYING TO LEARN
The deeper questions behind the research:
• Why are people buying? → core angles and benefits
• What problems are they solving? → pain points for ad copy
• What do they desire? → aspiration angles and imagery ideas
• What almost stopped them buying? → objections to address with risk reversal
• What brands did they consider? → competitors to study
• What "sticky words" do they use? → use their exact language in copy

STEP 5 — APPLY CREATIVE DIVERSITY
Meta's algorithm groups similar ads and makes them compete. Avoid this with diversity across four dimensions:
1. Message — different personas, angles, emotions, awareness levels, offers
2. Media Type — static image, video/reel, carousel, collection
3. Creative Framework — benefits, us vs them, before/after, UGC, founder story, case study, PAS, AIDA
4. Style — lo-fi/raw/authentic, hi-fi/polished, AI-generated

STEP 6 — CREATE 3-5 AD VARIATIONS PER ANGLE
For each angle identified in research:
• Create 3-5 variations (different headlines, different visuals, different hooks)
• Ensure both image and video format are covered for each angle
• Use the 4 U's to score every headline: Urgent, Unique, Ultra-Specific, Useful (aim for 3+ on at least three)

AD CREATION GUIDELINES
• Use 7th-grade reading level — accessible language wins
• Focus on benefits, not features
• Write in present tense and address the reader directly ("You")
• Always include social proof and a clear call to action
• Keep headlines to 5-8 words in the headline field

CAUTIONARY NOTES
• Never start creating ads before market research is complete
• Avoid overly complex language — clarity beats cleverness
• Templates speed up creation — use the VirtueCore template library`}

{id:"ma8",title:"Module 8: Creating Effective Ad Campaigns — Live Walkthrough",lessons:[
{id:"ma8l1",title:"Understanding Your Audience Before You Build",mins:13,video:"7996eb00c1a94883953fadd77acfc354",body:`CREATING EFFECTIVE AD CAMPAIGNS — SOP

OBJECTIVE
Build effective Meta ad campaigns by deeply understanding your client's goals and target audience before touching Ads Manager.

STEP 1 — UNDERSTAND THE CLIENT'S GOALS
Before creating anything, clarify:
• What is the campaign objective? (leads, sales, bookings, awareness?)
• What does success look like for this client?
• What is the minimum acceptable cost per result?
• Is there a specific offer, deadline, or promotion to feature?

STEP 2 — IDENTIFY THE IDEAL CUSTOMER
Answer before writing a single word:
Question 1: WHO is the ideal customer?
Not a vague group — a specific person:
• What do they do for work?
• What do they earn?
• What keeps them up at night?
• What words do they actually use?

Question 2: HOW AWARE ARE THEY?
Use Eugene Schwartz's 5 Awareness Levels to determine HOW you write the ad:

Level 1 — UNAWARE: "I don't even know I have a problem."
→ Your ad should: educate or entertain. Don't sell yet. Best formats: educational, humour, celebrity.

Level 2 — PROBLEM AWARE: "I know something's wrong but don't know what to do."
→ Your ad should: call out their pain, make them feel seen. Best formats: UGC, founder story, tutorials.

Level 3 — SOLUTION AWARE: "I know solutions exist. I'm comparing."
→ Your ad should: show why YOU are different. Best formats: Us vs them, features/benefits.

Level 4 — PRODUCT AWARE: "I know you exist but not sure yet."
→ Your ad should: prove it works. Best formats: testimonials, 3 reasons why.

Level 5 — MOST AWARE: "I know you. Just need a reason NOW."
→ Your ad should: give them an offer, create urgency. Best formats: offers, retargeting.

STEP 3 — CONDUCT MARKET RESEARCH
Use the Market Research SOP to identify:
• Top 1-4 ICPs
• Top 1-4 buying angles
• Main hesitations
• Tone and language preferences

STEP 4 — ANALYSE COMPETITOR ADS
• Visit Meta Ad Library and search for competitors
• Focus on ads running 3+ months (probably profitable)
• Analyse: angles, offers, headlines, copy length, targeting, visual style
• Ask: what is this ad doing that is clearly working?

STEP 5 — IMPLEMENT CREATIVE DIVERSITY
To avoid Meta's algorithm grouping your ads and making them compete:
1. Message — different personas, angles, emotions, awareness levels
2. Media Type — static, video, carousel
3. Creative Framework — benefits, us vs them, before/after, UGC, case study, PAS, AIDA, listicle
4. Style — lo-fi/raw, hi-fi/polished, AI-generated

STEP 6 — CREATE AD VARIATIONS
For each persona × angle combination:
• Write 3-5 ad variations
• Ensure a mix of image and video format
• Score every headline using the 4 U's framework (Urgent, Unique, Ultra-Specific, Useful)
• Aim for at least 3 out of 4 U's on each headline

CAUTIONARY NOTES
• Ensure all ads comply with Meta's advertising policies before publishing
• Review and adjust campaigns regularly based on performance data
• Document all research findings — future campaigns on the same account benefit from this knowledge base`},
{id:"ma8l2",title:"Live Full Campaign Walkthrough",mins:18,video:"46384cc09bd2488fbce2850e1e582af5",body:`LIVE META AD CAMPAIGN BUILD — WALKTHROUGH

OBJECTIVE
Watch and follow along as a complete Meta Ads campaign is built from scratch — from research brief through to published ad.

WHAT THIS SESSION COVERS
This live walkthrough demonstrates the complete end-to-end process of building a Meta Ads campaign for a real client scenario. Use this as a reference for your own campaign builds.

BEFORE YOU START (PRE-LAUNCH CHECKLIST)
✓ Market research document is complete and approved
✓ Client's Meta Ad Account is connected to the VirtueCore portfolio
✓ Pixel is installed and verified in Test Events (all key events fire once)
✓ Pixel Settings are configured: Automatic Website Matching ON, Auto-Track Events OFF
✓ Event Match Quality (EMQ) score is above 5
✓ Creative assets (images/videos) are ready and exported in correct dimensions
✓ Ad copy has been written for all angle/persona combinations
✓ The client's Facebook Page and Instagram account are connected

CAMPAIGN STRUCTURE SUMMARY
Campaign: ABO Testing — [Service Name]
  Ad Set 1: [Date] | [Persona 1] | [Angle 1] | Adv+ Broad | Auto Placements
    Ad 1a: [Persona 1] | [Angle 1] | Static Image v1
    Ad 1b: [Persona 1] | [Angle 1] | Static Image v2
    Ad 1c: [Persona 1] | [Angle 1] | Video Hook v1
  Ad Set 2: [Date] | [Persona 2] | [Angle 2] | Adv+ Broad | Auto Placements
    Ad 2a: [Persona 2] | [Angle 2] | UGC Video v1
    Ad 2b: [Persona 2] | [Angle 2] | Testimonial Static

POST-LAUNCH ACTIONS
• Monitor for first 24 hours — check that ads are approved by Meta and spending
• After 3-5 days — check initial data. Do not make changes before this.
• After 7 days — review 7-day CPL average. Compare ad sets. Pause what's clearly not working.
• After 14 days — begin optimisation decisions based on full data set

KEY REMINDERS FROM THE WALKTHROUGH
• Name EVERYTHING clearly — future you (and the client) will thank you
• Set the ad set start date to TOMORROW MORNING — never launch same evening
• Always preview your ad on mobile before publishing — most users are on mobile
• Check the tracking section before publishing — confirm the correct pixel event is selected
• Use Advantage+ Placements unless you have a specific reason not to
• Always check for Meta policy warnings before hitting Publish

AFTER PUBLISHING — WHAT TO TELL THE CLIENT
• "Your ads are now live and in the review process — Meta typically approves within 24 hours."
• "Do not make any changes for the first 3-5 days — this disrupts the learning phase."
• "You will receive a performance update from us after 7 days with initial data."
• "If you see the ads running in your personal feed, that's normal and means they're working."`}

{id:"imageads",icon:"🎨",color:"#EC4899",tagBg:"rgba(236,72,153,0.12)",tagCol:"#F472B6",tag:"CREATIVE",title:"Image Ads with Canva",

{id:"ia1",title:"Image Ad Fundamentals",lessons:[
{id:"ia1l1",title:"Speed, Quality & the Template Rule",mins:6,body:`THE CORE PRINCIPLE OF IMAGE AD CREATION

At VirtueCore, image ads should be made fast without sacrificing quality. The key to doing both is templates.

THE EFFICIENCY STANDARD
• Image ads should take a maximum of 30 minutes each
• Spending an hour per image ad is inefficient and unsustainable
• Use Canva templates — we have a set folder of proven layouts to pull from
• Once market research is done, image ad creation is essentially copy-and-paste

WHY TEMPLATES WORK
Templates give you the layout, sizing, and visual hierarchy sorted in advance. You're only changing the headline, supporting text, imagery, and colours to match the client's brand. The heavy lifting is already done.

THE RULE ON TEXT IN IMAGE ADS
Do not over-add text. Image ads should lead with a visual and one strong headline. Secondary text (if any) should be minimal. Meta's algorithm also historically penalises ads with too much text overlay.

VOLUME + QUALITY
The aim is to produce as many image ads as possible while maintaining quality. Why volume matters:
• More variations = more testing data
• Meta's algorithm needs options to find winners
• Creative fatigue happens faster than most people expect — you need a pipeline of fresh ads ready

One strong image ad batched into 5-10 variations (different headlines, different imagery, different formats) is far more powerful than one perfect ad.`},
{id:"ia1l2",title:"Applying Market Research to Image Ads",mins:8,body:`FROM RESEARCH TO CREATIVE

By the time you're building image ads, you should already have the market research document for that client. If you don't, stop and request it.

WHAT THE RESEARCH GIVES YOU
• The ICP (Ideal Customer Profile) — who the ad is for
• Pain points — what frustrates this person
• Desired outcomes — what they want their life/business to look like
• Angles — the top 1-4 reasons people buy from this client
• Sticky words — language the customer actually uses (use these exactly)
• Visual direction — what imagery resonates with this audience

HOW TO APPLY IT
For each angle from the research, create a separate image ad concept:
• Angle 1 (e.g. Pain): Headline hits the problem directly. Imagery shows the frustrated state.
• Angle 2 (e.g. Aspiration): Headline shows the desired outcome. Imagery shows the ideal state.
• Angle 3 (e.g. Social Proof): Headline is a result or testimonial. Imagery is the client/customer.

CANVA WORKFLOW
1. Open the VirtueCore Canva template folder — select the layout that fits the format (1:1, 9:16, 1.91:1)
2. Duplicate the template — never edit the original
3. Replace the headline with your angle's headline
4. Replace the imagery — use client-provided photos or licensed stock (Canva Pro includes stock)
5. Adjust brand colours if needed
6. Export at maximum quality
7. Name the file clearly: [ClientName]_[Angle]_[Format]_[Date]`}

{id:"leadmag",icon:"🧲",color:"#14B8A6",tagBg:"rgba(20,184,166,0.12)",tagCol:"#2DD4BF",tag:"LEAD GEN",title:"Lead Magnets",

{id:"lm1",title:"Lead Magnet Strategy & Creation",lessons:[
{id:"lm1l1",title:"What Makes a Good Lead Magnet",mins:7,body:`THE PURPOSE OF A LEAD MAGNET

A lead magnet is something of genuine value you give away for free in exchange for contact information. It's the first step in converting a stranger into a lead.

TWO THINGS YOU NEED TO CREATE AN EFFECTIVE LEAD MAGNET
1. What the customer actually wants — what would they genuinely find valuable enough to exchange their email for?
2. The client's niche and business variables — what industry are they in, what do they offer, who is their ideal customer?

Without both, you cannot create a lead magnet that attracts the right people.

WHAT MAKES A LEAD MAGNET WORK
• Specificity — "The Wedding Photographer's Checklist for Booking 4 Extra Clients Per Month" beats "Marketing Tips for Photographers"
• Immediate value — they should get value the moment they download it, not after a 6-step process
• Directly relevant — it should be something only your ideal customer would want. A broad lead magnet attracts unqualified leads.
• One clear promise — it does one thing really well. Not a guide to everything.

TYPES OF LEAD MAGNETS WE BUILD
• Checklists — fastest to produce, high perceived value
• Mini-guides / eBooks — more detailed, slightly higher trust signal
• Templates — something they can use immediately (swipe files, scripts, frameworks)
• Quizzes and audits — high engagement, especially for service-based businesses
• Video training / mini-course — higher effort to produce but highest trust`},
{id:"lm1l2",title:"AI-Assisted Lead Magnet Creation",mins:8,body:`THE VIRTUECORE LEAD MAGNET WORKFLOW

STEP 1 — GATHER CLIENT INFORMATION
Before creating anything, collect from the client (via their onboarding form or call notes):
• What industry/niche are they in?
• Who is their ideal customer?
• What is the main problem they solve?
• What has their best result been for a client?
• What do their customers want most?

STEP 2 — USE AI TO GENERATE IDEAS
Open ChatGPT or Claude. Use this prompt structure:

"You are a lead generation specialist. My client is a [BUSINESS TYPE] targeting [TARGET CUSTOMER]. Their main offer is [MAIN SERVICE/PRODUCT]. Their customer's biggest problem is [PAIN POINT]. Generate 10 specific lead magnet ideas that would attract their ideal customer. Each idea should be specific, immediately valuable, and relevant to someone who would be a qualified prospect."

Review the ideas and select the most relevant one. Use your judgment — the AI gives you options, not the final answer.

STEP 3 — CREATE THE CONTENT WITH AI
Once you have the concept:
"Create the full content for a lead magnet called '[TITLE]' for a [BUSINESS TYPE]. It should be [FORMAT: checklist / guide / template]. Target reader: [ICP DESCRIPTION]. Make it specific, actionable, and immediately useful. Use simple language."

STEP 4 — BUILD IN CANVA
• Open VirtueCore's lead magnet Canva template folder
• Select the appropriate template (PDF guide, checklist, or worksheet format)
• Duplicate the template — never edit the original
• Add the AI-generated content, structured clearly with headers and bullet points
• Apply the client's brand colours and logo
• Export as PDF`}

{id:"typeform",icon:"📋",color:"#6366F1",tagBg:"rgba(99,102,241,0.12)",tagCol:"#818CF8",tag:"QUALIFICATION",title:"Typeform for Client Qualification",
desc:"Build Typeform qualification forms that filter leads, collect data, and connect to Zapier automations for client pipelines.",
modules:[
{id:"tf1",title:"Setup, ICP & Question Design",lessons:[
{id:"tf1l1",title:"What Typeform Is For at VirtueCore",mins:6,body:`THE PURPOSE OF TYPEFORM IN OUR SYSTEM

Typeform is the connector between our clients' advertising and their sales pipeline. Its job is simple: filter out people who are not a good fit before they reach the client's calendar.

A well-built Typeform:
• Identifies whether the prospect has the right budget
• Qualifies their timeline and intent
• Collects the exact information the client needs before a sales call
• Automatically routes qualified leads to a booking page and disqualified leads to a polite rejection

WHERE IT SITS IN THE CLIENT SYSTEM
Option A: On the Facebook/Instagram ad as an Instant Form (built inside Meta Ads Manager)
Option B: Built on Typeform and embedded into the client's website
Option C: Direct link sent to prospects via DM, email, or ad

In either case, the form data flows through Zapier into the client's CRM (usually GHL), and the client is notified of each new qualified lead.

WHAT YOU NEED BEFORE STARTING
• Client's Typeform account login — they must provide this
• The client's ICP (Ideal Customer Profile) — either from their onboarding form or from your own research
• Budget threshold — the minimum budget/investment level they will accept
• Desired outcome — what the client wants to achieve for their customers
• Any specific deal-breakers — dates, locations, industries to exclude`},
{id:"tf1l2",title:"Generating the Right Questions",mins:7,body:`THE MOST IMPORTANT PART OF TYPEFORM IS THE QUESTIONS

Bad questions = unqualified leads slipping through. Good questions = only the right people reach the client's calendar.

QUESTION DESIGN USING AI
Use this ChatGPT/Claude prompt to generate the question set:

"Create filtering questions for a [BUSINESS TYPE] intake form that will qualify leads based on: [CRITERIA — e.g. budget range, timeline, location, specific requirements]. The form should: filter out anyone with a budget below [AMOUNT], identify their specific needs, and collect full contact information. Format as a list of questions with the question type (multiple choice, short text, etc.) next to each one."

QUESTION STRUCTURE (in order)
1. Contact information — First name, last name, email, phone (all required)
   Why first: if they drop off, you still have their contact details
2. Budget question — Multiple Choice. Position this EARLY to filter quickly
3. Timeline/date question — when do they need this?
4. Specific requirements — what exactly are they looking for?
5. Qualifying questions — niche-specific (varies by client)

QUESTION TYPE GUIDE
• Multiple Choice — for single-select options (budget ranges, service types)
• Multiple Selection — when multiple answers are allowed
• Short Text — for brief written answers (company name, location)
• Long Text — for detailed descriptions of their needs
• Date — for event dates or timelines
• Email / Phone — use the dedicated field types, not short text — they validate format automatically`}

{id:"tf2",title:"Building, Logic & Publishing",lessons:[
{id:"tf2l1",title:"Form Structure & Conditional Logic",mins:9,body:`BUILDING THE FORM IN TYPEFORM

CREATING THE FORM
1. Log into the client's Typeform account at admin.typeform.com
2. Click "+ Create a new form" → "Start from scratch"
3. Name it clearly: "[Client Name] — Client Qualification Form"

FORM SECTIONS
• Section 1: Contact Information (name, email, phone)
• Section 2: Qualifying Questions (budget, timeline, specific needs)
• Section 3: Any niche-specific questions

SETTING UP CONDITIONAL LOGIC (BRANCHING)
This is what makes the form intelligent. Without branching, everyone gets the same ending.

How to access: Workflow tab → Branching

FOR THE BUDGET QUESTION:
• Click on the budget question in the workflow view
• Click "Manage Branching"
• Add rule: IF answer IS "[low budget option]" THEN go to [Rejection Ending]
• Set "All other cases go to" → next qualifying question

FOR DATE/TIMELINE QUESTIONS:
• Add rule: IF date is in the past THEN redirect to rejection page
• Add rule: IF date is within 2 weeks THEN route to urgent follow-up

CREATING ENDINGS
Create at least two endings:
• Ending A — Qualified leads: redirect to client's Calendly/booking page
• Ending B — Unqualified leads: polite thank you message, offer an alternative resource

Every logic path must lead to a defined ending. Test every possible route before publishing.`},
{id:"tf2l2",title:"Branding, Testing & Publishing",mins:7,body:`APPLYING CLIENT BRANDING

1. Click "Design" tab in the form editor
2. Set primary brand colour (use hex code from client's brand guidelines)
3. Use ChatGPT/Claude to suggest complementary colours if needed: "Suggest two complementary colours for a brand with primary colour [HEX]. The audience is [ICP DESCRIPTION]."
4. Upload the client's logo: Design → Logo → Upload
5. Select a font that matches the brand's tone (professional, playful, minimal)
6. Remove Typeform branding if the client has a paid plan: Settings → Remove Typeform branding

TESTING BEFORE PUBLISHING (NON-NEGOTIABLE)
Click "Preview" and test every path:
✓ Submit a QUALIFYING response — verify it routes to the booking page
✓ Submit a DISQUALIFYING response — verify it routes to the rejection ending
✓ Test all possible answer combinations that trigger different logic paths
✓ Test on both desktop and mobile
✓ Proofread every question for spelling and grammar
✓ Verify all redirect URLs actually work

PUBLISHING & HANDOVER
1. Delete all test responses from Results before going live
2. Click "Publish"
3. Copy the direct share link
4. Share with the client along with a brief explanation of how the logic works
5. Document any conditional logic rules for your own reference and for the client`}
],quiz:{id:"tf2q",title:"Typeform Building Quiz",qs:[

{id:"zapier",icon:"⚡",color:"#F59E0B",tagBg:"rgba(245,158,11,0.12)",tagCol:"#FCD34D",tag:"AUTOMATION",title:"Automation with Zapier",

{id:"zap1",title:"Zapier Fundamentals",lessons:[
{id:"zap1l1",title:"How Zapier Works",mins:6,body:`THE CORE CONCEPT

Zapier connects apps that don't naturally talk to each other. The logic is always: when X happens in App A, do Y in App B.

THREE COMPONENTS
• Trigger — the event that starts the Zap. e.g. "A new Typeform response is submitted"
• Action — what Zapier does in response. e.g. "Add a row to Google Sheets"
• Filter — an optional condition. e.g. "Only if the budget answer is above £1,000"

WHAT YOU NEED TO KNOW FOR VIRTUECORE WORK
You don't need to learn every Zapier feature. You need to master three core combinations:

1. Typeform → Google Sheets → Email notification to client/sales team
2. Facebook Lead Ads → GoHighLevel CRM → Slack notification
3. Webhook → Google Sheets (for tracking custom data like quiz results)

THE ZAPIER ACCOUNT
The client provides the Zapier login — you don't use a VirtueCore account for client Zaps.
When you first log in, go straight to the Zaps section. This is where all existing automations live.
The Home section has an AI assistant — you can type "create a lead sheet for my Facebook ads" and Zapier will suggest a structure. Useful for getting started, but always review and customise.`},
{id:"zap1l2",title:"Building the Core Zap — Typeform to Sheets",mins:9,body:`THE MOST IMPORTANT ZAP YOU WILL BUILD

The Typeform → Google Sheets → Email notification Zap is the backbone of most client lead qualification systems. Here's how to build it step by step.

BEFORE YOU START
Map the workflow in plain English first:
"When a new Typeform response comes in → add it to the leads sheet → email the sales team with the lead details"

Always map before you build. Zaps built without a map technically work but often don't solve the actual problem.

STEP-BY-STEP BUILD

Step 1: Create a new Zap → Trigger app: Typeform → Event: New Entry
Connect the client's Typeform account. Select the correct form. Test the trigger by pulling in a real response.

Step 2: Action 1 → App: Google Sheets → Event: Create Spreadsheet Row
Connect the client's Google account. Select the correct spreadsheet and sheet tab.
Map each Typeform field to the correct column. This step is where most errors happen — check every mapping carefully.

Step 3: Action 2 → App: Gmail → Event: Send Email
To: client's email / sales team email
Subject: "New Lead: [First Name] [Last Name] — [Budget Answer]"
Body: map all the relevant fields so the email includes full lead details

Step 4: Test the full Zap using the test data. Confirm the row appears in Sheets and the email arrives.
Step 5: Turn the Zap ON and monitor the Zap History for the first 24-48 hours.`}

{id:"zap2",title:"Module 2: Live Zap Build — Typeform to Sheets to Gmail",lessons:[
{id:"zap2l1",title:"Full Automation Walkthrough",mins:28,video:"c9355c2dc10b41a68cd9df966b9210ab",body:`CREATING AUTOMATIONS WITH ZAPIER — SOP

OBJECTIVE
Build a Zapier automation that captures Typeform lead submissions, logs them into Google Sheets, and sends an instant email notification to the sales team — all without any manual effort.

STEP 1 — ACCESS ZAPIER AND CREATE A NEW ZAP
• Log in to Zapier using the credentials provided by the client (never create a personal account for client work)
• Navigate to the Zaps section — this is the main area for creating automations
• Click Create to start a new Zap

STEP 2 — CHOOSE YOUR CREATION METHOD (AI OR MANUAL)
• You can build the Zap using Copilot (AI) or manually
• For AI, type a clear request such as:
  "Please create an automation that sends Typeform answers into Google Sheets and emails the sales team about the new lead generated."
• AI will suggest the trigger and actions — review each step carefully before confirming

STEP 3 — CONFIGURE TYPEFORM AS THE TRIGGER
• Select Typeform as the trigger app
• Choose the trigger event: New Entry
• Connect the client's Typeform account and select the specific form you want to use
• Test the trigger to confirm Zapier can receive a sample submission

STEP 4 — SET UP GOOGLE SHEETS
• Open Google Sheets and create a new spreadsheet to collect lead data
• Set up columns for each Typeform question (e.g., Name, Email, Phone Number, Message, Submission Date)
• Name the sheet clearly (e.g., "Lead Tracker — [Client Name]")

STEP 5 — MAP TYPEFORM RESPONSES TO GOOGLE SHEETS
• In Zapier, add the action: Google Sheets → Create Spreadsheet Row
• Use the Mapping feature to connect each Typeform field to the correct Google Sheets column
• Double-check every field mapping — mismatched fields are the most common source of errors
• Test this step and confirm the data appears correctly in the spreadsheet

STEP 6 — SET UP EMAIL NOTIFICATIONS VIA GMAIL
• Add a new action: Gmail → Send Email
• Configure the email to send to the sales team's email address
• Include the relevant lead details in the email body using dynamic Typeform fields:
  — Name
  — Email address
  — Phone number
  — Any qualifying answers
• Write a clear subject line, e.g., "New Lead: [First Name] [Last Name] — [Form Name]"

STEP 7 — TEST THE FULL AUTOMATION
• Run a test submission through the Typeform form
• Confirm the data lands correctly in Google Sheets
• Confirm the email notification sends to the sales team with accurate information
• Fix any field mapping issues before publishing

STEP 8 — PUBLISH AND TURN ON THE ZAP
• Once everything is tested, click Publish to make the Zap live
• Ensure the Zap toggle is switched ON — a published but inactive Zap will not run
• Monitor the Zap History tab for the first 24–48 hours to confirm it runs without errors

CAUTIONARY NOTES
• Always test each step individually before testing the full flow
• Never use your personal Gmail for client automation emails — always use the client's account
• Ensure you have the necessary permissions to access the client's Typeform and Google Sheets accounts

TIPS FOR EFFICIENCY
• Use Zapier's Copilot (AI) for common automation patterns to save setup time
• Regularly review and update Zaps if connected apps change their form structure or field names
• Use templates for common automation setups to maintain consistency`}

{id:"email",icon:"📧",color:"#3B82F6",tagBg:"rgba(59,130,246,0.12)",tagCol:"#60A5FA",tag:"EMAIL MKT",title:"Email Marketing",
desc:"Master email marketing from scratch — inbox warm-up, MailChimp setup, WooCommerce integration, email design, abandoned cart automation, survey campaigns, and live watch-and-learn sessions.",
modules:[

{id:"em-m1",title:"Module 1: Setup & Integration",lessons:[
{id:"em-m1l1",title:"Client Inbox Warm-Up",mins:8,video:"22bea3d286ae4f5eb40607177f1ecc93",body:`CLIENT INBOX WARM-UP — SOP

PURPOSE
Before sending any marketing emails from a client's domain, the inbox must be warmed up. Sending cold from a brand-new or dormant domain causes spam filters to flag all outgoing mail, destroying deliverability and wasting every campaign you build.

WHY INBOX WARM-UP MATTERS
Email service providers (ESPs) like Gmail, Outlook, and Yahoo use sender reputation scores to decide whether to deliver your email to the inbox, spam folder, or reject it entirely. A new or inactive domain starts with zero reputation. If you immediately blast 1,000 emails, the ESP will treat it as spam activity and likely blacklist the sending domain.

Warm-up gradually builds trust with the ESPs by showing them that real people are receiving, opening, and engaging with emails from this domain.

THE WARM-UP PROCESS
Week 1 — Send 20–50 emails per day
Week 2 — Send 50–100 emails per day
Week 3 — Send 100–250 emails per day
Week 4 — Send 250–500 emails per day
After Week 4 — Scale to full campaign volume

WHAT TO SEND DURING WARM-UP
• Send to your most engaged, real contacts first (people who know and expect email from you)
• Use plain text or simple HTML — no heavy image-only emails
• Encourage recipients to reply or move the email from spam if it lands there
• Do NOT send to purchased or scraped lists — only genuine opt-in contacts

TOOLS FOR AUTOMATED WARM-UP
If the client is starting from zero with no existing list to warm up against, use a warm-up tool such as:
• Warmup Inbox
• Mailwarm
• Lemwarm

These tools send real-back-and-forth emails between seeded inboxes to build domain reputation on autopilot. Set one up and let it run for at least 2–4 weeks before the first campaign.

WHAT TO CHECK BEFORE WARM-UP
1. SPF record — is it configured correctly in DNS?
2. DKIM record — is it active and passing?
3. DMARC record — is a policy set?
4. Domain age — is the domain at least 30 days old?

If any of these are missing, set them up first. Email authentication is non-negotiable.

SIGN-OFF
Do not begin any campaign sending until warm-up is complete and the domain's spam score is green. Document the warm-up start date in the client's folder.`},

{id:"em-m1l2",title:"MailChimp Site Tracking for WooCommerce",mins:6,video:"39ac44f548164691a6f75841e24dba1b",body:`MAILCHIMP SITE TRACKING FOR WOOCOMMERCE — SOP

PURPOSE
Site tracking allows MailChimp to follow what subscribers do on the client's WooCommerce store — which pages they visit, what they add to cart, and whether they complete a purchase. This data powers abandoned cart automations and audience segmentation.

STEP 1 — INSTALL THE MAILCHIMP FOR WOOCOMMERCE PLUGIN
1. Log into the client's WordPress admin dashboard
2. Navigate to Plugins → Add New Plugin
3. Search for "Mailchimp for WooCommerce"
4. Click Install Now, then Activate

STEP 2 — CONNECT TO THE MAILCHIMP ACCOUNT
1. After activation, go to WooCommerce → Mailchimp
2. Click Connect Account
3. Log into the client's Mailchimp account and authorise the connection
4. Select the correct Audience (mailing list) to sync with

STEP 3 — CONFIGURE SYNC SETTINGS
In the plugin settings panel:
• Sync existing WooCommerce customers → ON
• Track carts → ON (this is essential for abandoned cart automations)
• Track orders → ON
• Sync order data → ON

STEP 4 — ENABLE SITE TRACKING
Still in the Mailchimp plugin settings:
• Scroll to the "Mailchimp Site Tracking" section
• Toggle site tracking ON
• This inserts MailChimp's tracking script on all pages of the store automatically

STEP 5 — VERIFY THE CONNECTION
1. In MailChimp, go to Audience → All Contacts
2. Confirm existing WooCommerce customers are appearing
3. Browse the client's store while logged into a test account — wait 10–15 minutes
4. Check in MailChimp → Audience → Activity to confirm page visits are being tracked

WHAT GETS TRACKED
• Pages visited on the store
• Products viewed
• Items added to cart
• Cart abandoned (when a user leaves without purchasing)
• Purchases completed

This data feeds into all automations you build in later modules. Without site tracking enabled, abandoned cart flows will not fire.`},

{id:"em-m1l3",title:"Monster Run Integrations",mins:4,video:"31ca3f09a4144d4fa78f873a31ed8df2",body:`MONSTER RUN INTEGRATIONS — SOP

PURPOSE
Monster Run refers to the batch of integrations required when onboarding a new e-commerce client onto the full email marketing stack. This SOP ensures every connection is in place before any campaign work begins.

THE INTEGRATION CHECKLIST
Run through every item on this list for every new e-commerce email client:

[ ] 1. MailChimp account created or accessed
[ ] 2. Sending domain verified in MailChimp (domain authentication — SPF, DKIM)
[ ] 3. MailChimp for WooCommerce plugin installed and activated
[ ] 4. Plugin connected to correct MailChimp audience
[ ] 5. Site tracking enabled
[ ] 6. Cart tracking confirmed active
[ ] 7. Audience sync completed (existing customers pulled in)
[ ] 8. MailChimp audience fields mapped correctly (first name, last name, email, order history)
[ ] 9. Tags set up for segmentation (e.g. "Purchased", "Abandoned Cart", "New Subscriber")
[ ] 10. Transactional email service connected if applicable (Mandrill/SMTP)
[ ] 11. Unsubscribe link and footer compliance checked

COMMON INTEGRATION ERRORS

Error: WooCommerce plugin not syncing orders
Fix: Deactivate and reactivate the plugin. Check API key permissions in MailChimp.

Error: Cart abandonment not triggering
Fix: Confirm site tracking script is loading. Test by adding item to cart from a tracked email subscriber's session.

Error: Domain not verified
Fix: Add the DKIM CNAME records to the client's DNS provider. Allow 24–48 hours to propagate.

AFTER COMPLETING THE MONSTER RUN
Document which integrations were completed and the date in the client's Notion or Google Drive folder. Flag any items that could not be completed and escalate to Samuel or Caleb before starting campaign work.`}
